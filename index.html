<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Tournament</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1d23;
    --bg2: #22262e;
    --bg3: #2a2f38;
    --card: #2e333d;
    --card-hover: #363b47;
    --accent: #f5a623;
    --accent2: #e8941e;
    --green: #4caf50;
    --red: #e74c3c;
    --text: #e8e8e8;
    --text2: #9a9faa;
    --text3: #6b7080;
    --border: #3a3f4a;
    --connector: #4a4f5a;
    --winner-bg: #2d4a2d;
    --loser-bg: #4a2d2d;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    font-size: 22px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-header h1 span { font-size: 26px; }
  .nav-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
  }
  .nav-tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-tab.active { background: var(--accent); color: #000; }
  .nav-tab:hover:not(.active) { color: var(--text); background: var(--bg3); }

  /* ─── SCREENS ─── */
  .screen { display: none; padding: 24px; }
  .screen.active { display: block; }

  /* ─── SETUP SCREEN ─── */
  .setup-container { max-width: 600px; margin: 0 auto; padding-top: 20px; }
  .setup-section {
    background: var(--bg2);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .setup-section h2 {
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 13px;
  }
  .format-toggle { display: flex; gap: 8px; }
  .format-btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .format-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,166,35,0.08);
  }
  .format-btn small { display: block; font-size: 11px; font-weight: 400; margin-top: 4px; color: var(--text3); }

  .player-input-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .player-num {
    width: 28px; height: 28px; border-radius: 50%; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text3); flex-shrink: 0;
  }
  .player-input-row input {
    flex: 1; padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .player-input-row input:focus { border-color: var(--accent); }
  .player-input-row input::placeholder { color: var(--text3); }
  .remove-player-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    background: transparent; color: var(--text3); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .remove-player-btn:hover { background: var(--red); color: #fff; }

  .add-player-btn {
    width: 100%; padding: 10px; border-radius: 8px;
    border: 2px dashed var(--border); background: transparent;
    color: var(--text3); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .add-player-btn:hover { border-color: var(--accent); color: var(--accent); }

  .start-btn {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: var(--accent); color: #000; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
  }
  .start-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .doubles-note {
    background: rgba(245,166,35,0.08);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 8px; padding: 10px 14px; font-size: 12px;
    color: var(--accent); margin-bottom: 16px; line-height: 1.5;
  }

  /* ─── BRACKET SCREEN ─── */
  .bracket-header { text-align: center; margin-bottom: 8px; }
  .bracket-header h2 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .bracket-header .week-info { color: var(--text2); font-size: 14px; }
  .bracket-header .format-badge {
    display: inline-block; background: var(--accent); color: #000;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; margin-left: 8px; text-transform: uppercase;
  }

  .bracket-wrapper { overflow-x: auto; padding: 10px 0 20px; }

  /* Labels row */
  .bracket-labels {
    display: grid;
    margin-bottom: 8px;
    padding: 0 20px;
  }
  .bracket-labels .round-label {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    padding: 8px 0;
  }

  /* Bracket grid */
  .bracket-grid {
    display: grid;
    padding: 0 20px;
  }

  /* Matchups */
  .matchup { position: relative; }

  .match-slot {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: default;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 36px;
    white-space: nowrap;
  }
  .match-slot:first-child { border-radius: 6px 6px 0 0; }
  .match-slot:last-child { border-radius: 0 0 6px 6px; border-top: 1px solid var(--bg); }

  .match-slot.empty { color: var(--text3); font-style: italic; }
  .match-slot.bye { color: var(--text3); font-style: italic; background: var(--bg3); }

  .match-slot.clickable { cursor: pointer; }
  .match-slot.clickable:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    z-index: 2;
    position: relative;
  }

  .match-slot.winner {
    background: var(--winner-bg);
    border-color: var(--green);
    color: #7bed7b;
    font-weight: 700;
  }
  .match-slot.loser {
    background: var(--loser-bg);
    opacity: 0.6;
    text-decoration: line-through;
  }

  .match-slot .player-name { flex: 1; }
  .match-slot .score-badge {
    font-size: 10px; font-weight: 700; color: var(--accent); margin-left: 8px;
  }

  /* ─── BRACKET CONNECTORS ─── */
  .bracket-conn {
    position: relative;
  }

  /* Left bracket: ─┐ ├─ ─┘ */
  .bracket-conn-left::before {
    content: '';
    position: absolute;
    top: 25%;
    bottom: 25%;
    left: 0;
    right: 50%;
    border-top: 2px solid var(--connector);
    border-right: 2px solid var(--connector);
    border-bottom: 2px solid var(--connector);
  }
  .bracket-conn-left::after {
    content: '';
    position: absolute;
    top: calc(50% - 1px);
    left: calc(50% - 1px);
    right: 0;
    border-top: 2px solid var(--connector);
  }

  /* Right bracket: ┌─ ─┤ └─ */
  .bracket-conn-right::before {
    content: '';
    position: absolute;
    top: 25%;
    bottom: 25%;
    left: 50%;
    right: 0;
    border-top: 2px solid var(--connector);
    border-left: 2px solid var(--connector);
    border-bottom: 2px solid var(--connector);
  }
  .bracket-conn-right::after {
    content: '';
    position: absolute;
    top: calc(50% - 1px);
    left: 0;
    right: calc(50% - 1px);
    border-top: 2px solid var(--connector);
  }

  /* Simple horizontal line connector */
  .bracket-conn-line::before {
    content: '';
    position: absolute;
    top: calc(50% - 1px);
    left: 0;
    right: 0;
    border-top: 2px solid var(--connector);
  }

  /* Champion */
  .champion-display { text-align: center; padding: 40px 20px; margin-top: 20px; }
  .champion-display.hidden { display: none; }
  .champion-trophy { font-size: 64px; margin-bottom: 12px; }
  .champion-label {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: var(--accent); margin-bottom: 8px;
  }
  .champion-name { font-size: 32px; font-weight: 800; }
  .new-tournament-btn {
    margin-top: 24px; padding: 12px 32px; border-radius: 10px;
    border: 2px solid var(--accent); background: transparent;
    color: var(--accent); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .new-tournament-btn:hover { background: var(--accent); color: #000; }

  /* Score modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; min-width: 340px; max-width: 90vw;
  }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; }
  .modal-match { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .modal-player {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    background: var(--bg); border-radius: 10px; border: 2px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .modal-player:hover { border-color: var(--accent); }
  .modal-player.selected { border-color: var(--green); background: var(--winner-bg); }
  .modal-player .name { flex: 1; font-weight: 600; font-size: 15px; }
  .modal-player .check { font-size: 20px; visibility: hidden; }
  .modal-player.selected .check { visibility: visible; }
  .modal-vs {
    text-align: center; font-size: 12px; font-weight: 700;
    color: var(--text3); text-transform: uppercase; letter-spacing: 2px;
  }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .modal-cancel { background: var(--bg3); color: var(--text2); }
  .modal-cancel:hover { background: var(--border); }
  .modal-confirm { background: var(--accent); color: #000; }
  .modal-confirm:hover { background: var(--accent2); }
  .modal-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── STATS SCREEN ─── */
  .stats-container { max-width: 700px; margin: 0 auto; padding-top: 10px; }
  .stats-toggle {
    display: flex; gap: 4px; background: var(--bg2); border-radius: 10px;
    padding: 4px; margin-bottom: 20px; border: 1px solid var(--border);
  }
  .stats-toggle-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    background: transparent; color: var(--text2); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .stats-toggle-btn.active { background: var(--accent); color: #000; }

  .stats-view { display: none; }
  .stats-view.active { display: block; }

  .leaderboard-table {
    width: 100%; border-collapse: collapse; background: var(--bg2);
    border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
  }
  .leaderboard-table th {
    padding: 12px 16px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text3);
    text-align: left; background: var(--bg3); border-bottom: 1px solid var(--border);
  }
  .leaderboard-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  .leaderboard-table tr:last-child td { border-bottom: none; }
  .leaderboard-table .rank { font-weight: 800; color: var(--accent); width: 40px; }
  .leaderboard-table .player-cell { font-weight: 600; }
  .leaderboard-table .wins-cell { color: var(--green); font-weight: 700; }
  .leaderboard-table .losses-cell { color: var(--red); font-weight: 700; }
  .leaderboard-table .champ-cell { color: var(--accent); font-weight: 700; }

  .week-history-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; margin-bottom: 12px;
  }
  .week-history-item h3 {
    font-size: 16px; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .week-history-item .week-date { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .week-history-item .week-champ {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2);
    padding: 6px 14px; border-radius: 8px; font-size: 14px;
    font-weight: 700; color: var(--accent);
  }
  .week-history-item .week-results {
    margin-top: 10px; font-size: 13px; color: var(--text2); line-height: 1.6;
  }

  .reset-section {
    margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: center;
  }
  .reset-btn {
    padding: 10px 20px; border-radius: 8px; border: 1px solid var(--red);
    background: transparent; color: var(--red); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { background: var(--red); color: #fff; }

  .empty-stats { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-stats .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-stats p { font-size: 15px; }

  /* ─── UNDO BAR ─── */
  .undo-bar {
    display: none; position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%); background: var(--bg2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 16px; align-items: center; gap: 12px;
    z-index: 150; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .undo-bar.active { display: flex; }
  .undo-bar span { font-size: 13px; color: var(--text2); }
  .undo-btn {
    padding: 6px 14px; border-radius: 6px; border: none;
    background: var(--accent); color: #000; font-size: 12px;
    font-weight: 700; cursor: pointer;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .app-header { flex-direction: column; gap: 10px; padding: 12px 16px; }
    .app-header h1 { font-size: 18px; }
    .app-header h1 span { font-size: 22px; }
    .nav-tab { padding: 7px 14px; font-size: 13px; }
    .setup-container { padding: 0 4px; }
    .match-slot { padding: 8px 10px; font-size: 12px; }

    .screen { padding: 14px 10px; }
    .stats-container { padding-top: 4px; }
    .stats-toggle { margin-bottom: 14px; }
    .stats-toggle-btn { font-size: 12px; padding: 9px 6px; }

    .leaderboard-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .leaderboard-table th { padding: 8px 6px; font-size: 10px; letter-spacing: 0.5px; }
    .leaderboard-table td { padding: 10px 6px; font-size: 13px; }
    .leaderboard-table .rank { width: 28px; padding-left: 8px; }
    .leaderboard-table th:first-child,
    .leaderboard-table td:first-child { padding-left: 8px; }
    .leaderboard-table th:last-child,
    .leaderboard-table td:last-child { padding-right: 8px; }

    .week-history-item { padding: 14px 12px; }
    .week-history-item h3 { font-size: 15px; }
    .week-history-item .week-date { font-size: 11px; }
    .week-history-item .week-champ { font-size: 13px; padding: 5px 12px; }
    .week-history-item .week-results { font-size: 12px; }

    .reset-section { flex-direction: column; align-items: stretch; gap: 8px; }
    .reset-btn { width: 100%; }

    .empty-stats { padding: 40px 16px; }
    .empty-stats .icon { font-size: 40px; }
    .empty-stats p { font-size: 14px; }

    .bracket-header h2 { font-size: 18px; }
    .bracket-header .week-info { font-size: 12px; }
    .bracket-header .format-badge { font-size: 10px; padding: 2px 8px; }
    .bracket-wrapper { padding: 6px 0 16px; }
    .bracket-labels, .bracket-grid { padding: 0 6px; }
    .bracket-labels .round-label { font-size: 9px; letter-spacing: 1px; padding: 6px 0; }
    .match-slot {
      padding: 6px 8px; font-size: 11px; min-height: 30px;
      overflow: hidden;
    }
    .match-slot .player-name {
      min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .match-slot .score-badge { font-size: 9px; margin-left: 4px; }
    .champion-display { padding: 30px 16px; }
    .champion-trophy { font-size: 52px; }
    .champion-name { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1><span>🏓</span> Pickleball Tournament</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showScreen('setup')">Setup</button>
    <button class="nav-tab" onclick="showScreen('bracket')">Bracket</button>
    <button class="nav-tab" onclick="showScreen('stats')">Stats</button>
  </div>
</div>

<!-- ═══ SETUP SCREEN ═══ -->
<div id="screen-setup" class="screen active">
  <div class="setup-container">
    <div class="setup-section">
      <h2>Match Format</h2>
      <div class="format-toggle">
        <button class="format-btn active" onclick="setFormat('singles')" id="fmt-singles">
          Singles<small>1 vs 1</small>
        </button>
        <button class="format-btn" onclick="setFormat('doubles')" id="fmt-doubles">
          Doubles<small>2 vs 2</small>
        </button>
      </div>
    </div>

    <div class="setup-section">
      <h2>Players</h2>
      <div id="doubles-note" class="doubles-note" style="display:none;">
        Enter individual player names. They'll be randomly paired into teams of 2.
      </div>
      <div id="player-list"></div>
      <button class="add-player-btn" onclick="addPlayerInput()">+ Add Player</button>
    </div>

    <div class="setup-section" style="background:transparent;border:none;padding:0;">
      <button class="start-btn" onclick="startTournament()" id="start-btn">
        Randomize &amp; Start Tournament
      </button>
      <p id="start-error" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none;"></p>
    </div>
  </div>
</div>

<!-- ═══ BRACKET SCREEN ═══ -->
<div id="screen-bracket" class="screen">
  <div class="bracket-header">
    <h2 id="bracket-title">Tournament Bracket</h2>
    <div class="week-info" id="bracket-week-info"></div>
  </div>
  <div class="bracket-wrapper">
    <div class="bracket-labels" id="bracket-labels"></div>
    <div class="bracket-grid" id="bracket-container"></div>
  </div>
  <div class="champion-display hidden" id="champion-display">
    <div class="champion-trophy">🏆</div>
    <div class="champion-label">Champion</div>
    <div class="champion-name" id="champion-name"></div>
    <button class="new-tournament-btn" onclick="showScreen('setup')">New Tournament</button>
  </div>
</div>

<!-- ═══ STATS SCREEN ═══ -->
<div id="screen-stats" class="screen">
  <div class="stats-container">
    <div class="stats-toggle">
      <button class="stats-toggle-btn active" onclick="showStatsView('lifetime')">Lifetime Leaderboard</button>
      <button class="stats-toggle-btn" onclick="showStatsView('weekly')">Weekly History</button>
    </div>
    <div id="stats-lifetime" class="stats-view active"></div>
    <div id="stats-weekly" class="stats-view"></div>
    <div class="reset-section">
      <button class="reset-btn" onclick="resetWeeklyStats()">Reset Weekly Stats</button>
      <button class="reset-btn" onclick="resetAllStats()">Reset All Stats</button>
    </div>
  </div>
</div>

<!-- ═══ WINNER MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Select Winner</h3>
    <div class="modal-match" id="modal-match"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modal-confirm" onclick="confirmWinner()" disabled>Confirm</button>
    </div>
  </div>
</div>

<!-- ═══ UNDO BAR ═══ -->
<div class="undo-bar" id="undo-bar">
  <span id="undo-text"></span>
  <button class="undo-btn" onclick="undoLastResult()">Undo</button>
</div>

<script>
// ─── STATE ───
let format = 'singles';
let tournament = null;
let selectedWinner = null;
let currentMatchInfo = null;
let undoStack = [];

// ─── PERSISTENCE ───
function loadData(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}
function saveData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let lifetimeStats = loadData('pb_lifetime', {});
let weeklyHistory = loadData('pb_weekly', []);

// ─── SETUP ───
function setFormat(f) {
  format = f;
  document.getElementById('fmt-singles').classList.toggle('active', f === 'singles');
  document.getElementById('fmt-doubles').classList.toggle('active', f === 'doubles');
  document.getElementById('doubles-note').style.display = f === 'doubles' ? 'block' : 'none';
  validateSetup();
}

function initPlayerInputs() {
  const container = document.getElementById('player-list');
  container.innerHTML = '';
  const saved = loadData('pb_players', []);
  const names = saved.length >= 4 ? saved : ['', '', '', ''];
  names.forEach((n, i) => createPlayerRow(container, i + 1, n));
}

function createPlayerRow(container, num, value) {
  const div = document.createElement('div');
  div.className = 'player-input-row';
  div.innerHTML = `
    <div class="player-num">${num}</div>
    <input type="text" placeholder="Player ${num}" value="${value || ''}" oninput="validateSetup()" onkeydown="if(event.key==='Enter'){addPlayerInput();}">
    <button class="remove-player-btn" onclick="removePlayer(this)" title="Remove">&times;</button>
  `;
  container.appendChild(div);
}

function addPlayerInput() {
  const container = document.getElementById('player-list');
  const count = container.children.length + 1;
  createPlayerRow(container, count, '');
  const inputs = container.querySelectorAll('input');
  inputs[inputs.length - 1].focus();
  renumberPlayers();
  validateSetup();
}

function removePlayer(btn) {
  const container = document.getElementById('player-list');
  if (container.children.length <= 4) return;
  btn.closest('.player-input-row').remove();
  renumberPlayers();
  validateSetup();
}

function renumberPlayers() {
  document.querySelectorAll('#player-list .player-input-row').forEach((row, i) => {
    row.querySelector('.player-num').textContent = i + 1;
  });
}

function getPlayerNames() {
  return Array.from(document.querySelectorAll('#player-list input'))
    .map(i => i.value.trim())
    .filter(n => n.length > 0);
}

function validateSetup() {
  const names = getPlayerNames();
  const btn = document.getElementById('start-btn');
  const err = document.getElementById('start-error');
  const minPlayers = format === 'doubles' ? 4 : 2;
  const uniqueNames = new Set(names);

  if (names.length < minPlayers) {
    btn.disabled = true;
    err.style.display = names.length > 0 ? 'block' : 'none';
    err.textContent = `Need at least ${minPlayers} players`;
    return;
  }
  if (uniqueNames.size !== names.length) {
    btn.disabled = true;
    err.style.display = 'block';
    err.textContent = 'Player names must be unique';
    return;
  }
  if (format === 'doubles' && names.length % 2 !== 0) {
    btn.disabled = true;
    err.style.display = 'block';
    err.textContent = 'Doubles requires an even number of players';
    return;
  }
  btn.disabled = false;
  err.style.display = 'none';
}

// ─── TOURNAMENT LOGIC ───
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextPowerOf2(n) {
  let p = 1;
  while (p < n) p *= 2;
  return p;
}

function getRoundName(roundIdx, totalRounds) {
  const fromFinal = totalRounds - 1 - roundIdx;
  if (fromFinal === 0) return 'Final';
  if (fromFinal === 1) return 'Semifinals';
  if (fromFinal === 2) return 'Quarterfinals';
  return `Round of ${Math.pow(2, fromFinal + 1)}`;
}

function startTournament() {
  const playerNames = getPlayerNames();
  saveData('pb_players', playerNames);

  let participants;
  if (format === 'doubles') {
    const shuffled = shuffle(playerNames);
    participants = [];
    for (let i = 0; i < shuffled.length; i += 2) {
      participants.push(shuffled[i] + ' & ' + shuffled[i + 1]);
    }
  } else {
    participants = shuffle(playerNames);
  }

  const n = participants.length;
  const bracketSize = nextPowerOf2(n);
  const totalRounds = Math.log2(bracketSize);
  const byeCount = bracketSize - n;

  // Distribute byes evenly across bracket positions
  const slots = new Array(bracketSize).fill(null);
  if (byeCount > 0) {
    const step = bracketSize / byeCount;
    const byePositions = new Set();
    for (let i = 0; i < byeCount; i++) {
      byePositions.add(Math.round((i + 1) * step) - 1);
    }
    let pi = 0;
    for (let i = 0; i < bracketSize; i++) {
      if (byePositions.has(i)) {
        slots[i] = null;
      } else {
        slots[i] = participants[pi++];
      }
    }
  } else {
    for (let i = 0; i < n; i++) {
      slots[i] = participants[i];
    }
  }

  // Build rounds
  const rounds = [];
  const firstRound = [];
  for (let i = 0; i < bracketSize; i += 2) {
    const m = { player1: slots[i], player2: slots[i + 1], winner: null, isBye: false };
    if (m.player1 === null && m.player2 === null) {
      m.isBye = true;
    } else if (m.player1 === null) {
      m.winner = m.player2; m.isBye = true;
    } else if (m.player2 === null) {
      m.winner = m.player1; m.isBye = true;
    }
    firstRound.push(m);
  }
  rounds.push(firstRound);

  for (let r = 1; r < totalRounds; r++) {
    const prevLen = rounds[r - 1].length;
    const thisRound = [];
    for (let i = 0; i < prevLen; i += 2) {
      thisRound.push({ player1: null, player2: null, winner: null, isBye: false });
    }
    rounds.push(thisRound);
  }

  propagateByes(rounds);

  const weekNum = weeklyHistory.length + 1;
  tournament = {
    rounds, participants, format,
    week: weekNum,
    date: new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }),
    results: []
  };

  undoStack = [];
  renderBracket();
  showScreen('bracket');
}

function propagateByes(rounds) {
  for (let r = 0; r < rounds.length - 1; r++) {
    for (let m = 0; m < rounds[r].length; m += 2) {
      const nextMatchIdx = Math.floor(m / 2);
      const match1 = rounds[r][m];
      const match2 = rounds[r][m + 1];
      const nextMatch = rounds[r + 1][nextMatchIdx];

      if (match1 && match1.winner) nextMatch.player1 = match1.winner;
      if (match2 && match2.winner) nextMatch.player2 = match2.winner;

      if (nextMatch.player1 && !nextMatch.player2 &&
          match2 && match2.isBye && !match2.player1 && !match2.player2) {
        nextMatch.winner = nextMatch.player1;
        nextMatch.isBye = true;
      } else if (nextMatch.player2 && !nextMatch.player1 &&
                 match1 && match1.isBye && !match1.player1 && !match1.player2) {
        nextMatch.winner = nextMatch.player2;
        nextMatch.isBye = true;
      }
    }
  }
}

// ─── BRACKET RENDERING (CSS GRID — SPLIT LEFT/RIGHT) ───
function renderBracket() {
  if (!tournament) return;
  const { rounds } = tournament;
  const totalRounds = rounds.length;
  const numSideRounds = totalRounds - 1;

  // Update header
  document.getElementById('bracket-title').innerHTML =
    `Week ${tournament.week} Tournament <span class="format-badge">${tournament.format}</span>`;
  document.getElementById('bracket-week-info').textContent = tournament.date;

  const container = document.getElementById('bracket-container');
  const labelsEl = document.getElementById('bracket-labels');
  container.innerHTML = '';
  labelsEl.innerHTML = '';

  // ── Special case: only 2 participants (single final) ──
  if (totalRounds === 1) {
    labelsEl.style.display = 'none';
    container.style.display = 'flex';
    container.style.justifyContent = 'center';
    container.style.paddingTop = '40px';
    container.style.removeProperty('grid-template-columns');
    container.style.removeProperty('grid-template-rows');
    container.appendChild(createMatchupElement(rounds[0][0], 0, 0));
    checkChampion();
    return;
  }

  // ── Grid setup ──
  const matchesPerSide = rounds[0].length / 2;
  const gridRows = matchesPerSide * 2;
  const isMobile = window.innerWidth <= 600;
  const isTiny = window.innerWidth <= 380;
  const rowHeight = isMobile
    ? Math.max(40, Math.min(70, 420 / gridRows))
    : Math.max(50, Math.min(90, 500 / gridRows));
  const totalCols = 4 * numSideRounds + 1;

  const roundColW = isTiny ? 'minmax(68px, 1fr)' : isMobile ? 'minmax(82px, 1fr)' : 'minmax(150px, 1fr)';
  const finalColW = isTiny ? 'minmax(76px, 1fr)' : isMobile ? 'minmax(92px, 1fr)' : 'minmax(160px, 1fr)';
  const connW = isMobile ? '18px' : '36px';

  // Column widths: [round, conn, round, conn, ...] FINAL [..., conn, round, conn, round]
  const colWidths = [];
  for (let i = 0; i < numSideRounds; i++) {
    colWidths.push(roundColW); // round
    colWidths.push(connW); // connector
  }
  colWidths.push(finalColW); // final
  for (let i = 0; i < numSideRounds; i++) {
    colWidths.push(connW); // connector
    colWidths.push(roundColW); // round
  }
  const colTemplate = colWidths.join(' ');

  // ── Labels row ──
  labelsEl.style.display = 'grid';
  labelsEl.style.gridTemplateColumns = colTemplate;

  for (let sr = 0; sr < numSideRounds; sr++) {
    const label = document.createElement('div');
    label.className = 'round-label';
    label.textContent = getRoundName(sr, totalRounds);
    label.style.gridColumn = `${2 * sr + 1}`;
    labelsEl.appendChild(label);
  }
  // Final label
  const finalLabel = document.createElement('div');
  finalLabel.className = 'round-label';
  finalLabel.textContent = 'Final';
  finalLabel.style.gridColumn = `${2 * numSideRounds + 1}`;
  labelsEl.appendChild(finalLabel);
  // Right side labels (mirrored)
  for (let sr = numSideRounds - 1; sr >= 0; sr--) {
    const label = document.createElement('div');
    label.className = 'round-label';
    label.textContent = getRoundName(sr, totalRounds);
    label.style.gridColumn = `${2 * numSideRounds + 1 + 2 * (numSideRounds - sr)}`;
    labelsEl.appendChild(label);
  }

  // ── Bracket grid ──
  container.style.display = 'grid';
  container.style.gridTemplateColumns = colTemplate;
  container.style.gridTemplateRows = `repeat(${gridRows}, ${rowHeight}px)`;
  container.style.gap = '0';
  container.style.alignItems = 'stretch';

  // ── Place LEFT side matchups ──
  for (let sr = 0; sr < numSideRounds; sr++) {
    const allMatches = rounds[sr];
    const halfLen = allMatches.length / 2;
    const sideMatches = allMatches.slice(0, halfLen);
    const gridCol = 2 * sr + 1; // 1-indexed
    const span = Math.pow(2, sr + 1);

    sideMatches.forEach((match, mIdx) => {
      const el = createMatchupElement(match, sr, mIdx);
      el.style.gridColumn = `${gridCol}`;
      el.style.gridRow = `${mIdx * span + 1} / span ${span}`;
      el.style.alignSelf = 'center';
      container.appendChild(el);
    });
  }

  // ── Place LEFT side connectors ──
  for (let sr = 0; sr < numSideRounds; sr++) {
    const sideMatchCount = rounds[sr].length / 2;
    const connCol = 2 * sr + 2;
    const span = Math.pow(2, sr + 1);

    if (sideMatchCount <= 1) {
      // Horizontal line
      const conn = document.createElement('div');
      conn.className = 'bracket-conn bracket-conn-line';
      conn.style.gridColumn = `${connCol}`;
      conn.style.gridRow = `1 / span ${gridRows}`;
      container.appendChild(conn);
    } else {
      const numPairs = sideMatchCount / 2;
      const pairSpan = span * 2;
      for (let p = 0; p < numPairs; p++) {
        const conn = document.createElement('div');
        conn.className = 'bracket-conn bracket-conn-left';
        conn.style.gridColumn = `${connCol}`;
        conn.style.gridRow = `${p * pairSpan + 1} / span ${pairSpan}`;
        container.appendChild(conn);
      }
    }
  }

  // ── Place FINAL ──
  const finalCol = 2 * numSideRounds + 1;
  const finalEl = createMatchupElement(rounds[totalRounds - 1][0], totalRounds - 1, 0);
  finalEl.style.gridColumn = `${finalCol}`;
  finalEl.style.gridRow = `1 / span ${gridRows}`;
  finalEl.style.alignSelf = 'center';
  container.appendChild(finalEl);

  // ── Place RIGHT side matchups ──
  for (let sr = 0; sr < numSideRounds; sr++) {
    const allMatches = rounds[sr];
    const halfLen = allMatches.length / 2;
    const sideMatches = allMatches.slice(halfLen);
    const gridCol = 2 * numSideRounds + 1 + 2 * (numSideRounds - sr);
    const span = Math.pow(2, sr + 1);

    sideMatches.forEach((match, mIdx) => {
      const actualMatchIdx = mIdx + halfLen;
      const el = createMatchupElement(match, sr, actualMatchIdx);
      el.style.gridColumn = `${gridCol}`;
      el.style.gridRow = `${mIdx * span + 1} / span ${span}`;
      el.style.alignSelf = 'center';
      container.appendChild(el);
    });
  }

  // ── Place RIGHT side connectors ──
  for (let sr = 0; sr < numSideRounds; sr++) {
    const sideMatchCount = rounds[sr].length / 2;
    const connCol = 2 * numSideRounds + 2 * (numSideRounds - sr);
    const span = Math.pow(2, sr + 1);

    if (sideMatchCount <= 1) {
      const conn = document.createElement('div');
      conn.className = 'bracket-conn bracket-conn-line';
      conn.style.gridColumn = `${connCol}`;
      conn.style.gridRow = `1 / span ${gridRows}`;
      container.appendChild(conn);
    } else {
      const numPairs = sideMatchCount / 2;
      const pairSpan = span * 2;
      for (let p = 0; p < numPairs; p++) {
        const conn = document.createElement('div');
        conn.className = 'bracket-conn bracket-conn-right';
        conn.style.gridColumn = `${connCol}`;
        conn.style.gridRow = `${p * pairSpan + 1} / span ${pairSpan}`;
        container.appendChild(conn);
      }
    }
  }

  checkChampion();
}

function createMatchupElement(match, roundIdx, matchIdx) {
  const matchup = document.createElement('div');
  matchup.className = 'matchup';
  matchup.appendChild(createSlot(match.player1, match, 1, roundIdx, matchIdx));
  matchup.appendChild(createSlot(match.player2, match, 2, roundIdx, matchIdx));
  return matchup;
}

function createSlot(playerName, match, slotNum, roundIdx, matchIdx) {
  const slot = document.createElement('div');
  slot.className = 'match-slot';

  if (!playerName) {
    slot.classList.add('empty');
    const span = document.createElement('span');
    span.className = 'player-name';
    span.textContent = 'TBD';
    slot.appendChild(span);

    if (!match.player1 && !match.player2 && match.isBye) {
      slot.classList.remove('empty');
      slot.classList.add('bye');
      span.textContent = '—';
    }
    return slot;
  }

  const nameSpan = document.createElement('span');
  nameSpan.className = 'player-name';
  nameSpan.textContent = playerName;
  slot.appendChild(nameSpan);

  if (match.winner === playerName) {
    slot.classList.add('winner');
    const badge = document.createElement('span');
    badge.className = 'score-badge';
    badge.textContent = 'W';
    slot.appendChild(badge);
  } else if (match.winner && match.winner !== playerName) {
    slot.classList.add('loser');
  } else if (match.player1 && match.player2 && !match.winner && !match.isBye) {
    slot.classList.add('clickable');
    slot.addEventListener('click', () => openModal(roundIdx, matchIdx));
  }

  return slot;
}

function checkChampion() {
  if (!tournament) return;
  const totalRounds = tournament.rounds.length;
  const finalMatch = tournament.rounds[totalRounds - 1][0];
  const champDisplay = document.getElementById('champion-display');
  if (finalMatch.winner) {
    champDisplay.classList.remove('hidden');
    document.getElementById('champion-name').textContent = finalMatch.winner;
  } else {
    champDisplay.classList.add('hidden');
  }
}

// ─── MODAL ───
function openModal(roundIdx, matchIdx) {
  const match = tournament.rounds[roundIdx][matchIdx];
  if (match.winner || !match.player1 || !match.player2) return;

  currentMatchInfo = { roundIdx, matchIdx };
  selectedWinner = null;

  const modalMatch = document.getElementById('modal-match');
  modalMatch.innerHTML = '';

  [match.player1, match.player2].forEach((name, i) => {
    if (i === 1) {
      const vs = document.createElement('div');
      vs.className = 'modal-vs';
      vs.textContent = 'vs';
      modalMatch.appendChild(vs);
    }
    const div = document.createElement('div');
    div.className = 'modal-player';
    div.innerHTML = '<span class="name"></span><span class="check">✓</span>';
    div.querySelector('.name').textContent = name;
    div.addEventListener('click', () => {
      selectedWinner = name;
      document.querySelectorAll('.modal-player').forEach(p => p.classList.remove('selected'));
      div.classList.add('selected');
      document.getElementById('modal-confirm').disabled = false;
    });
    modalMatch.appendChild(div);
  });

  document.getElementById('modal-confirm').disabled = true;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  currentMatchInfo = null;
  selectedWinner = null;
}

function confirmWinner() {
  if (!selectedWinner || !currentMatchInfo) return;

  const { roundIdx, matchIdx } = currentMatchInfo;
  const match = tournament.rounds[roundIdx][matchIdx];
  const loser = match.player1 === selectedWinner ? match.player2 : match.player1;

  undoStack.push(JSON.parse(JSON.stringify(tournament)));

  match.winner = selectedWinner;
  tournament.results.push({ winner: selectedWinner, loser });

  updatePlayerStat(selectedWinner, 'wins');
  updatePlayerStat(loser, 'losses');

  const totalRounds = tournament.rounds.length;
  if (roundIdx < totalRounds - 1) {
    const nextMatchIdx = Math.floor(matchIdx / 2);
    const nextMatch = tournament.rounds[roundIdx + 1][nextMatchIdx];
    if (matchIdx % 2 === 0) {
      nextMatch.player1 = selectedWinner;
    } else {
      nextMatch.player2 = selectedWinner;
    }
  }

  if (roundIdx === totalRounds - 1) {
    updatePlayerStat(selectedWinner, 'championships');
    saveTournamentToHistory();
  }

  closeModal();
  renderBracket();
  showUndo(`${selectedWinner} wins vs ${loser}`);
  saveStats();
}

function updatePlayerStat(name, stat) {
  if (!lifetimeStats[name]) {
    lifetimeStats[name] = { wins: 0, losses: 0, championships: 0 };
  }
  lifetimeStats[name][stat]++;
}

function saveTournamentToHistory() {
  weeklyHistory.push({
    week: tournament.week,
    date: tournament.date,
    format: tournament.format,
    champion: tournament.rounds[tournament.rounds.length - 1][0].winner,
    participants: tournament.participants,
    results: tournament.results
  });
  saveData('pb_weekly', weeklyHistory);
}

function saveStats() {
  saveData('pb_lifetime', lifetimeStats);
}

// ─── UNDO ───
function showUndo(text) {
  document.getElementById('undo-text').textContent = text;
  document.getElementById('undo-bar').classList.add('active');
  clearTimeout(window._undoTimer);
  window._undoTimer = setTimeout(() => {
    document.getElementById('undo-bar').classList.remove('active');
  }, 6000);
}

function undoLastResult() {
  if (undoStack.length === 0) return;

  const lastResult = tournament.results[tournament.results.length - 1];
  if (lastResult) {
    const wasChampionship = tournament.rounds[tournament.rounds.length - 1][0].winner;
    if (wasChampionship) {
      lifetimeStats[wasChampionship].championships--;
      if (weeklyHistory.length > 0 && weeklyHistory[weeklyHistory.length - 1].week === tournament.week) {
        weeklyHistory.pop();
        saveData('pb_weekly', weeklyHistory);
      }
    }
    if (lifetimeStats[lastResult.winner]) lifetimeStats[lastResult.winner].wins--;
    if (lifetimeStats[lastResult.loser]) lifetimeStats[lastResult.loser].losses--;
    saveStats();
  }

  tournament = undoStack.pop();
  renderBracket();
  document.getElementById('undo-bar').classList.remove('active');
}

// ─── STATS RENDERING ───
function showStatsView(view) {
  document.querySelectorAll('.stats-toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.stats-view').forEach(v => v.classList.remove('active'));

  if (view === 'lifetime') {
    document.querySelector('.stats-toggle-btn:first-child').classList.add('active');
    document.getElementById('stats-lifetime').classList.add('active');
    renderLifetimeStats();
  } else {
    document.querySelector('.stats-toggle-btn:last-child').classList.add('active');
    document.getElementById('stats-weekly').classList.add('active');
    renderWeeklyHistory();
  }
}

function renderLifetimeStats() {
  const container = document.getElementById('stats-lifetime');
  const entries = Object.entries(lifetimeStats).filter(([_, s]) => s.wins > 0 || s.losses > 0);

  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-stats"><div class="icon">📊</div><p>No stats yet. Play a tournament to see the leaderboard!</p></div>';
    return;
  }

  entries.sort((a, b) => {
    if (b[1].championships !== a[1].championships) return b[1].championships - a[1].championships;
    if (b[1].wins !== a[1].wins) return b[1].wins - a[1].wins;
    const aTotal = a[1].wins + a[1].losses;
    const bTotal = b[1].wins + b[1].losses;
    const aWinPct = aTotal > 0 ? a[1].wins / aTotal : 0;
    const bWinPct = bTotal > 0 ? b[1].wins / bTotal : 0;
    return bWinPct - aWinPct;
  });

  let html = `<table class="leaderboard-table">
    <thead><tr><th>#</th><th>Player</th><th>W</th><th>L</th><th>Win %</th><th>🏆</th></tr></thead><tbody>`;
  entries.forEach(([name, stats], i) => {
    const total = stats.wins + stats.losses;
    const pct = total > 0 ? Math.round((stats.wins / total) * 100) : 0;
    html += `<tr>
      <td class="rank">${i + 1}</td>
      <td class="player-cell">${name}</td>
      <td class="wins-cell">${stats.wins}</td>
      <td class="losses-cell">${stats.losses}</td>
      <td>${pct}%</td>
      <td class="champ-cell">${stats.championships || '—'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderWeeklyHistory() {
  const container = document.getElementById('stats-weekly');

  if (weeklyHistory.length === 0) {
    container.innerHTML = '<div class="empty-stats"><div class="icon">📅</div><p>No tournament history yet. Complete a tournament to see results here!</p></div>';
    return;
  }

  let html = '';
  [...weeklyHistory].reverse().forEach(week => {
    html += `<div class="week-history-item">
      <h3>Week ${week.week}</h3>
      <div class="week-date">${week.date} · ${week.format.charAt(0).toUpperCase() + week.format.slice(1)} · ${week.participants.length} ${week.format === 'doubles' ? 'teams' : 'players'}</div>
      <div class="week-champ">🏆 ${week.champion}</div>
      <div class="week-results">
        ${week.results.map(r => `${r.winner} <span style="color:var(--text3)">defeated</span> ${r.loser}`).join('<br>')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── RESET ───
function resetWeeklyStats() {
  if (!confirm('Reset all weekly history? Lifetime stats will be kept.')) return;
  weeklyHistory = [];
  saveData('pb_weekly', weeklyHistory);
  renderWeeklyHistory();
}

function resetAllStats() {
  if (!confirm('Reset ALL stats including lifetime leaderboard? This cannot be undone.')) return;
  lifetimeStats = {};
  weeklyHistory = [];
  saveData('pb_lifetime', lifetimeStats);
  saveData('pb_weekly', weeklyHistory);
  renderLifetimeStats();
  renderWeeklyHistory();
}

// ─── NAVIGATION ───
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[['setup', 'bracket', 'stats'].indexOf(name)].classList.add('active');
  if (name === 'stats') showStatsView('lifetime');
  if (name === 'bracket' && tournament) renderBracket();
}

// ─── INIT ───
initPlayerInputs();
validateSetup();

let _resizeTimer;
function _handleViewportChange() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (tournament && document.getElementById('screen-bracket').classList.contains('active')) {
      renderBracket();
    }
  }, 200);
}
window.addEventListener('resize', _handleViewportChange);
window.addEventListener('orientationchange', () => {
  // iOS sometimes reports stale dimensions in the immediate handler;
  // wait for the layout to settle, then re-render.
  setTimeout(_handleViewportChange, 250);
});
</script>
</body>
