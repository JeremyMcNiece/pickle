<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<script>
// ─── STATE ───
let format = 'singles';
let style = 'bracket'; // 'bracket' | 'roundrobin'
let tournament = null;
let selectedWinner = null;
let currentMatchInfo = null;
let undoStack = [];
let justAdvancedSlots = new Set();

function saveTournamentState() {
  if (tournament) {
    saveData('pb_tournament', { tournament, undoStack });
  } else {
    localStorage.removeItem('pb_tournament');
  }
}
function loadTournamentState() {
  const saved = loadData('pb_tournament', null);
  if (saved && saved.tournament) {
    tournament = saved.tournament;
    undoStack = Array.isArray(saved.undoStack) ? saved.undoStack : [];
    // Prime _lastChampion so a rehydrated finished tournament doesn't re-fire celebration.
    const champion = tournament.style === 'roundrobin'
      ? tournament.rrChampion
      : tournament.rounds[tournament.rounds.length - 1][0].winner;
    if (champion) _lastChampion = champion;
  }
}

// ─── PERSISTENCE ───
function loadData(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}
function saveData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let lifetimeStats = loadData('pb_lifetime', {});
let weeklyHistory = loadData('pb_weekly', []);

function ensurePlayerStats(name) {
  if (!lifetimeStats[name]) {
    lifetimeStats[name] = { wins: 0, losses: 0, championships: 0, currentStreak: 0, longestWinStreak: 0, h2h: {} };
  }
  // Migrate old entries
  if (lifetimeStats[name].currentStreak === undefined) lifetimeStats[name].currentStreak = 0;
  if (lifetimeStats[name].longestWinStreak === undefined) lifetimeStats[name].longestWinStreak = 0;
  if (!lifetimeStats[name].h2h) lifetimeStats[name].h2h = {};
}

// ─── THEME ───
function initTheme() {
  const saved = localStorage.getItem('pb_theme');
  const theme = saved || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pb_theme', next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme) {
  document.getElementById('theme-btn').innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
}
initTheme();

// ─── TOAST SYSTEM ───
function showToast(text, actionLabel, actionFn, duration) {
  duration = duration || 5000;
  const container = document.getElementById('toast-container');
  // If this toast has an action, dismiss any prior actionable toasts so their
  // (now-stale) buttons don't trigger an action that no longer matches the text.
  if (actionLabel && actionFn) {
    container.querySelectorAll('.toast.has-action').forEach(removeToast);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  const span = document.createElement('span');
  span.textContent = text;
  toast.appendChild(span);
  if (actionLabel && actionFn) {
    toast.classList.add('has-action');
    const btn = document.createElement('button');
    btn.className = 'toast-action';
    btn.textContent = actionLabel;
    btn.addEventListener('click', () => { actionFn(); removeToast(toast); });
    toast.appendChild(btn);
  }
  container.appendChild(toast);
  setTimeout(() => removeToast(toast), duration);
}
function removeToast(toast) {
  if (!toast.parentNode) return;
  toast.classList.add('leaving');
  setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
}

// ─── SETUP ───
function setFormat(f) {
  format = f;
  document.getElementById('fmt-singles').classList.toggle('active', f === 'singles');
  document.getElementById('fmt-doubles').classList.toggle('active', f === 'doubles');
  document.getElementById('doubles-note').style.display = f === 'doubles' ? 'block' : 'none';
  saveData('pb_format', f);
  validateSetup();
}

function setStyle(s) {
  style = s;
  document.getElementById('style-bracket').classList.toggle('active', s === 'bracket');
  document.getElementById('style-roundrobin').classList.toggle('active', s === 'roundrobin');
  // Consolation bracket only applies to bracket-style tournaments.
  const consolWrap = document.getElementById('opt-consolation').closest('.setup-section');
  if (consolWrap) consolWrap.style.display = s === 'bracket' ? '' : 'none';
  saveData('pb_style', s);
  validateSetup();
}

function initPlayerInputs() {
  const container = document.getElementById('player-list');
  container.innerHTML = '';
  const saved = loadData('pb_players', []);
  const names = saved.length >= 4 ? saved : ['', '', '', ''];
  names.forEach((n, i) => createPlayerRow(container, i + 1, n));
  updateRemoveButtonsState();
}

function createPlayerRow(container, num, value) {
  const div = document.createElement('div');
  div.className = 'player-input-row';
  const numDiv = document.createElement('div');
  numDiv.className = 'player-num';
  numDiv.textContent = num;
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Player ' + num;
  input.value = value || '';
  input.addEventListener('input', () => { savePlayerNamesDraft(); validateSetup(); });
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') addPlayerInput(); });
  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-player-btn';
  removeBtn.title = 'Remove';
  removeBtn.innerHTML = '&times;';
  removeBtn.addEventListener('click', () => removePlayer(removeBtn));
  div.appendChild(numDiv);
  div.appendChild(input);
  div.appendChild(removeBtn);
  container.appendChild(div);
}

function savePlayerNamesDraft() {
  const names = Array.from(document.querySelectorAll('#player-list input')).map(i => i.value);
  saveData('pb_players', names);
}

function updateRemoveButtonsState() {
  const rows = document.querySelectorAll('#player-list .player-input-row');
  const disabled = rows.length <= 4;
  rows.forEach(row => {
    const btn = row.querySelector('.remove-player-btn');
    if (btn) btn.disabled = disabled;
  });
}

function addPlayerInput() {
  const container = document.getElementById('player-list');
  const count = container.children.length + 1;
  createPlayerRow(container, count, '');
  const inputs = container.querySelectorAll('input');
  inputs[inputs.length - 1].focus();
  renumberPlayers();
  updateRemoveButtonsState();
  savePlayerNamesDraft();
  validateSetup();
}

function removePlayer(btn) {
  const container = document.getElementById('player-list');
  if (container.children.length <= 4) return;
  btn.closest('.player-input-row').remove();
  renumberPlayers();
  updateRemoveButtonsState();
  savePlayerNamesDraft();
  validateSetup();
}

function renumberPlayers() {
  document.querySelectorAll('#player-list .player-input-row').forEach((row, i) => {
    row.querySelector('.player-num').textContent = i + 1;
    row.querySelector('input').placeholder = 'Player ' + (i + 1);
  });
}

function getPlayerNames() {
  return Array.from(document.querySelectorAll('#player-list input'))
    .map(i => i.value.trim()).filter(n => n.length > 0);
}

function validateSetup() {
  const names = getPlayerNames();
  const btn = document.getElementById('start-btn');
  const err = document.getElementById('start-error');
  const minPlayers = format === 'doubles' ? 4 : 2;
  const uniqueNames = new Set(names);

  if (names.length < minPlayers) {
    btn.disabled = true;
    err.style.display = names.length > 0 ? 'block' : 'none';
    err.textContent = 'Need at least ' + minPlayers + ' players';
    return;
  }
  if (uniqueNames.size !== names.length) {
    btn.disabled = true; err.style.display = 'block';
    err.textContent = 'Player names must be unique'; return;
  }
  if (format === 'doubles' && names.length % 2 !== 0) {
    btn.disabled = true; err.style.display = 'block';
    err.textContent = 'Doubles requires an even number of players'; return;
  }
  btn.disabled = false; err.style.display = 'none';
}

// ─── TOURNAMENT LOGIC ───
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextPowerOf2(n) { let p = 1; while (p < n) p *= 2; return p; }

function getRoundName(roundIdx, totalRounds) {
  const fromFinal = totalRounds - 1 - roundIdx;
  if (fromFinal === 0) return 'Final';
  if (fromFinal === 1) return 'Semifinals';
  if (fromFinal === 2) return 'Quarterfinals';
  return 'Round of ' + Math.pow(2, fromFinal + 1);
}

function startTournament() {
  const playerNames = getPlayerNames();
  saveData('pb_players', playerNames);

  let participants;
  if (format === 'doubles') {
    const shuffled = shuffle(playerNames);
    participants = [];
    for (let i = 0; i < shuffled.length; i += 2) {
      participants.push(shuffled[i] + ' & ' + shuffled[i + 1]);
    }
  } else {
    participants = shuffle(playerNames);
  }

  const weekNum = weeklyHistory.length + 1;
  const today = new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  if (style === 'roundrobin') {
    const rrRounds = generateRoundRobin(participants);
    tournament = {
      rounds: rrRounds, participants, format, style: 'roundrobin',
      week: weekNum, date: today,
      results: [],
      rrChampion: null
    };
  } else {
    const n = participants.length;
    const bracketSize = nextPowerOf2(n);
    const totalRounds = Math.log2(bracketSize);
    const byeCount = bracketSize - n;

    const slots = new Array(bracketSize).fill(null);
    if (byeCount > 0) {
      const step = bracketSize / byeCount;
      const byePositions = new Set();
      for (let i = 0; i < byeCount; i++) {
        byePositions.add(Math.round((i + 1) * step) - 1);
      }
      let pi = 0;
      for (let i = 0; i < bracketSize; i++) {
        slots[i] = byePositions.has(i) ? null : participants[pi++];
      }
    } else {
      for (let i = 0; i < n; i++) slots[i] = participants[i];
    }

    const rounds = [];
    const firstRound = [];
    for (let i = 0; i < bracketSize; i += 2) {
      const m = { player1: slots[i], player2: slots[i + 1], winner: null, isBye: false, score1: null, score2: null };
      if (m.player1 === null && m.player2 === null) {
        m.isBye = true;
      } else if (m.player1 === null) {
        m.winner = m.player2; m.isBye = true;
      } else if (m.player2 === null) {
        m.winner = m.player1; m.isBye = true;
      }
      firstRound.push(m);
    }
    rounds.push(firstRound);

    for (let r = 1; r < totalRounds; r++) {
      const prevLen = rounds[r - 1].length;
      const thisRound = [];
      for (let i = 0; i < prevLen; i += 2) {
        thisRound.push({ player1: null, player2: null, winner: null, isBye: false, score1: null, score2: null });
      }
      rounds.push(thisRound);
    }

    propagateByes(rounds);

    const enableConsolation = document.getElementById('opt-consolation').checked;
    tournament = {
      rounds, participants, format, style: 'bracket',
      week: weekNum, date: today,
      results: [],
      consolationEnabled: enableConsolation,
      consolation: null
    };
  }

  undoStack = [];
  justAdvancedSlots.clear();
  saveTournamentState();
  renderBracket();
  showScreen('bracket');
}

// Round-robin scheduling via the circle method.
// Returns an array of rounds, each round is an array of match objects.
function generateRoundRobin(players) {
  let arr = [...players];
  const hasBye = arr.length % 2 === 1;
  if (hasBye) arr.push(null);
  const numPlayers = arr.length;
  const numRounds = numPlayers - 1;
  const halfSize = numPlayers / 2;
  const rounds = [];
  for (let r = 0; r < numRounds; r++) {
    const round = [];
    for (let i = 0; i < halfSize; i++) {
      const p1 = arr[i];
      const p2 = arr[numPlayers - 1 - i];
      if (p1 !== null && p2 !== null) {
        round.push({ player1: p1, player2: p2, winner: null, isBye: false, score1: null, score2: null });
      }
    }
    rounds.push(round);
    arr = [arr[0], arr[numPlayers - 1], ...arr.slice(1, numPlayers - 1)];
  }
  return rounds;
}

function computeStandings(rounds, participants) {
  const standings = {};
  participants.forEach(p => {
    standings[p] = { name: p, wins: 0, losses: 0, scoredFor: 0, scoredAgainst: 0, played: 0 };
  });
  rounds.forEach(round => {
    round.forEach(m => {
      if (!m.winner) return;
      const isP1Winner = m.winner === m.player1;
      const win = isP1Winner ? m.player1 : m.player2;
      const lose = isP1Winner ? m.player2 : m.player1;
      if (!standings[win] || !standings[lose]) return;
      standings[win].wins++; standings[win].played++;
      standings[lose].losses++; standings[lose].played++;
      if (m.score1 != null && m.score2 != null) {
        const wScore = isP1Winner ? m.score1 : m.score2;
        const lScore = isP1Winner ? m.score2 : m.score1;
        standings[win].scoredFor += wScore;
        standings[win].scoredAgainst += lScore;
        standings[lose].scoredFor += lScore;
        standings[lose].scoredAgainst += wScore;
      }
    });
  });
  const arr = Object.values(standings);
  arr.sort((a, b) => {
    if (b.wins !== a.wins) return b.wins - a.wins;
    const aDiff = a.scoredFor - a.scoredAgainst;
    const bDiff = b.scoredFor - b.scoredAgainst;
    if (bDiff !== aDiff) return bDiff - aDiff;
    return b.scoredFor - a.scoredFor;
  });
  return arr;
}

function isRoundRobinComplete() {
  return tournament.rounds.every(r => r.every(m => m.winner));
}

function propagateByes(rounds) {
  for (let r = 0; r < rounds.length - 1; r++) {
    for (let m = 0; m < rounds[r].length; m += 2) {
      const nextMatchIdx = Math.floor(m / 2);
      const match1 = rounds[r][m];
      const match2 = rounds[r][m + 1];
      const nextMatch = rounds[r + 1][nextMatchIdx];

      if (match1 && match1.winner) nextMatch.player1 = match1.winner;
      if (match2 && match2.winner) nextMatch.player2 = match2.winner;

      if (nextMatch.player1 && !nextMatch.player2 &&
          match2 && match2.isBye && !match2.player1 && !match2.player2) {
        nextMatch.winner = nextMatch.player1; nextMatch.isBye = true;
      } else if (nextMatch.player2 && !nextMatch.player1 &&
                 match1 && match1.isBye && !match1.player1 && !match1.player2) {
        nextMatch.winner = nextMatch.player2; nextMatch.isBye = true;
      }
    }
  }
}

// ─── BRACKET RENDERING (CSS GRID — SPLIT LEFT/RIGHT) ───
function renderBracketGrid(rounds, containerId, labelsId) {
  const totalRounds = rounds.length;
  const numSideRounds = totalRounds - 1;
  const isConsolation = containerId !== 'bracket-container';

  const container = document.getElementById(containerId);
  const labelsEl = labelsId ? document.getElementById(labelsId) : null;
  container.innerHTML = '';
  if (labelsEl) labelsEl.innerHTML = '';

  if (totalRounds === 1) {
    if (labelsEl) labelsEl.style.display = 'none';
    container.style.display = 'flex';
    container.style.justifyContent = 'center';
    container.style.paddingTop = '20px';
    container.style.removeProperty('grid-template-columns');
    container.style.removeProperty('grid-template-rows');
    container.appendChild(createMatchupElement(rounds[0][0], 0, 0, isConsolation));
    return;
  }

  const matchesPerSide = rounds[0].length / 2;
  const gridRows = matchesPerSide * 2;
  const isMobile = window.innerWidth <= 600;
  const isTiny = window.innerWidth <= 380;
  const rowHeight = isMobile
    ? Math.max(40, Math.min(70, 420 / gridRows))
    : Math.max(50, Math.min(90, 500 / gridRows));

  const roundColW = isTiny ? 'minmax(68px, 1fr)' : isMobile ? 'minmax(82px, 1fr)' : 'minmax(150px, 1fr)';
  const finalColW = isTiny ? 'minmax(76px, 1fr)' : isMobile ? 'minmax(92px, 1fr)' : 'minmax(160px, 1fr)';
  const connW = isMobile ? '18px' : '36px';

  const colWidths = [];
  for (let i = 0; i < numSideRounds; i++) { colWidths.push(roundColW); colWidths.push(connW); }
  colWidths.push(finalColW);
  for (let i = 0; i < numSideRounds; i++) { colWidths.push(connW); colWidths.push(roundColW); }
  const colTemplate = colWidths.join(' ');

  if (labelsEl) {
    labelsEl.style.display = 'grid';
    labelsEl.style.gridTemplateColumns = colTemplate;
    for (let sr = 0; sr < numSideRounds; sr++) {
      const label = document.createElement('div');
      label.className = 'round-label';
      label.textContent = getRoundName(sr, totalRounds);
      label.style.gridColumn = '' + (2 * sr + 1);
      labelsEl.appendChild(label);
    }
    const finalLabel = document.createElement('div');
    finalLabel.className = 'round-label';
    finalLabel.textContent = 'Final';
    finalLabel.style.gridColumn = '' + (2 * numSideRounds + 1);
    labelsEl.appendChild(finalLabel);
    for (let sr = numSideRounds - 1; sr >= 0; sr--) {
      const label = document.createElement('div');
      label.className = 'round-label';
      label.textContent = getRoundName(sr, totalRounds);
      label.style.gridColumn = '' + (2 * numSideRounds + 1 + 2 * (numSideRounds - sr));
      labelsEl.appendChild(label);
    }
  }

  container.style.display = 'grid';
  container.style.gridTemplateColumns = colTemplate;
  container.style.gridTemplateRows = 'repeat(' + gridRows + ', ' + rowHeight + 'px)';
  container.style.gap = '0';
  container.style.alignItems = 'stretch';

  // LEFT matchups
  for (let sr = 0; sr < numSideRounds; sr++) {
    const allMatches = rounds[sr];
    const halfLen = allMatches.length / 2;
    const sideMatches = allMatches.slice(0, halfLen);
    const gridCol = 2 * sr + 1;
    const span = Math.pow(2, sr + 1);
    sideMatches.forEach((match, mIdx) => {
      const el = createMatchupElement(match, sr, mIdx, isConsolation);
      el.style.gridColumn = '' + gridCol;
      el.style.gridRow = (mIdx * span + 1) + ' / span ' + span;
      el.style.alignSelf = 'center';
      container.appendChild(el);
    });
  }

  // LEFT connectors
  for (let sr = 0; sr < numSideRounds; sr++) {
    const sideMatchCount = rounds[sr].length / 2;
    const connCol = 2 * sr + 2;
    const span = Math.pow(2, sr + 1);
    if (sideMatchCount <= 1) {
      const conn = document.createElement('div');
      conn.className = 'bracket-conn bracket-conn-line';
      conn.style.gridColumn = '' + connCol;
      conn.style.gridRow = '1 / span ' + gridRows;
      container.appendChild(conn);
    } else {
      const numPairs = sideMatchCount / 2;
      const pairSpan = span * 2;
      for (let p = 0; p < numPairs; p++) {
        const conn = document.createElement('div');
        conn.className = 'bracket-conn bracket-conn-left';
        conn.style.gridColumn = '' + connCol;
        conn.style.gridRow = (p * pairSpan + 1) + ' / span ' + pairSpan;
        container.appendChild(conn);
      }
    }
  }

  // FINAL
  const finalCol = 2 * numSideRounds + 1;
  const finalEl = createMatchupElement(rounds[totalRounds - 1][0], totalRounds - 1, 0, isConsolation);
  finalEl.style.gridColumn = '' + finalCol;
  finalEl.style.gridRow = '1 / span ' + gridRows;
  finalEl.style.alignSelf = 'center';
  container.appendChild(finalEl);

  // RIGHT matchups
  for (let sr = 0; sr < numSideRounds; sr++) {
    const allMatches = rounds[sr];
    const halfLen = allMatches.length / 2;
    const sideMatches = allMatches.slice(halfLen);
    const gridCol = 2 * numSideRounds + 1 + 2 * (numSideRounds - sr);
    const span = Math.pow(2, sr + 1);
    sideMatches.forEach((match, mIdx) => {
      const actualMatchIdx = mIdx + halfLen;
      const el = createMatchupElement(match, sr, actualMatchIdx, isConsolation);
      el.style.gridColumn = '' + gridCol;
      el.style.gridRow = (mIdx * span + 1) + ' / span ' + span;
      el.style.alignSelf = 'center';
      container.appendChild(el);
    });
  }

  // RIGHT connectors
  for (let sr = 0; sr < numSideRounds; sr++) {
    const sideMatchCount = rounds[sr].length / 2;
    const connCol = 2 * numSideRounds + 2 * (numSideRounds - sr);
    const span = Math.pow(2, sr + 1);
    if (sideMatchCount <= 1) {
      const conn = document.createElement('div');
      conn.className = 'bracket-conn bracket-conn-line';
      conn.style.gridColumn = '' + connCol;
      conn.style.gridRow = '1 / span ' + gridRows;
      container.appendChild(conn);
    } else {
      const numPairs = sideMatchCount / 2;
      const pairSpan = span * 2;
      for (let p = 0; p < numPairs; p++) {
        const conn = document.createElement('div');
        conn.className = 'bracket-conn bracket-conn-right';
        conn.style.gridColumn = '' + connCol;
        conn.style.gridRow = (p * pairSpan + 1) + ' / span ' + pairSpan;
        container.appendChild(conn);
      }
    }
  }
}

function renderBracket() {
  if (!tournament) return;
  const styleLabel = tournament.style === 'roundrobin' ? 'Round Robin' : tournament.format;
  document.getElementById('bracket-title').innerHTML =
    'Week ' + tournament.week + ' Tournament <span class="format-badge">' + styleLabel + '</span>';
  document.getElementById('bracket-week-info').textContent = tournament.date;

  if (tournament.style === 'roundrobin') {
    renderRoundRobin();
    checkChampion();
    setTimeout(() => { justAdvancedSlots.clear(); }, 500);
    return;
  }

  // Hide round-robin area for bracket tournaments
  document.getElementById('rr-area').style.display = 'none';
  document.getElementById('bracket-wrapper').style.display = '';

  renderBracketGrid(tournament.rounds, 'bracket-container', 'bracket-labels');

  // Consolation
  const consolArea = document.getElementById('consolation-area');
  consolArea.innerHTML = '';
  if (tournament.consolation) {
    const section = document.createElement('div');
    section.className = 'consolation-section';
    section.innerHTML = '<h3>Consolation Bracket</h3><p class="consolation-subtitle">First-round losers battle it out</p>';
    const cLabels = document.createElement('div');
    cLabels.className = 'bracket-labels';
    cLabels.id = 'consolation-labels';
    const cGrid = document.createElement('div');
    cGrid.className = 'bracket-grid';
    cGrid.id = 'consolation-container';
    section.appendChild(cLabels);
    section.appendChild(cGrid);
    consolArea.appendChild(section);
    renderBracketGrid(tournament.consolation.rounds, 'consolation-container', 'consolation-labels');
  }

  checkChampion();
  // Clear animation markers after render
  setTimeout(() => { justAdvancedSlots.clear(); }, 500);
}

function renderRoundRobin() {
  const wrapper = document.getElementById('bracket-wrapper');
  const consolArea = document.getElementById('consolation-area');
  wrapper.style.display = 'none';
  consolArea.innerHTML = '';
  const rrArea = document.getElementById('rr-area');
  rrArea.style.display = '';
  rrArea.innerHTML = '';

  // Standings
  const standings = computeStandings(tournament.rounds, tournament.participants);
  const stHtml = ['<div class="rr-section"><h3>Standings</h3>',
    '<table class="rr-standings"><thead><tr><th>#</th><th>Player</th><th>W</th><th>L</th><th>+/−</th><th>PF</th></tr></thead><tbody>'];
  standings.forEach((s, i) => {
    const diff = s.scoredFor - s.scoredAgainst;
    const diffStr = diff > 0 ? '+' + diff : '' + diff;
    const cls = i === 0 && s.played > 0 ? 'leader' : '';
    stHtml.push('<tr class="' + cls + '"><td class="rank">' + (i + 1) + '</td><td>' + escHtml(s.name) + '</td><td class="wins-cell">' + s.wins + '</td><td class="losses-cell">' + s.losses + '</td><td>' + diffStr + '</td><td>' + s.scoredFor + '</td></tr>');
  });
  stHtml.push('</tbody></table></div>');
  rrArea.innerHTML = stHtml.join('');

  // Rounds
  tournament.rounds.forEach((round, rIdx) => {
    const allDone = round.every(m => m.winner);
    const section = document.createElement('div');
    section.className = 'rr-section';
    const heading = document.createElement('h3');
    heading.textContent = 'Round ' + (rIdx + 1);
    if (allDone) {
      const tag = document.createElement('span');
      tag.className = 'rr-round-done';
      tag.textContent = 'Complete';
      heading.appendChild(tag);
    }
    section.appendChild(heading);

    const matchList = document.createElement('div');
    matchList.className = 'rr-match-list';
    round.forEach((m, mIdx) => {
      const card = document.createElement('div');
      card.className = 'rr-match';
      if (m.winner) card.classList.add('done');
      else if (m.player1 && m.player2) card.classList.add('clickable');

      const left = document.createElement('div');
      left.className = 'rr-match-side';
      if (m.winner === m.player1) left.classList.add('winner');
      else if (m.winner) left.classList.add('loser');
      const leftName = document.createElement('span'); leftName.className = 'rr-name'; leftName.textContent = m.player1;
      const leftScore = document.createElement('span'); leftScore.className = 'rr-score';
      leftScore.textContent = m.score1 != null ? m.score1 : (m.winner === m.player1 ? 'W' : '');
      left.appendChild(leftName); left.appendChild(leftScore);

      const vs = document.createElement('div');
      vs.className = 'rr-vs';
      vs.textContent = 'vs';

      const right = document.createElement('div');
      right.className = 'rr-match-side';
      if (m.winner === m.player2) right.classList.add('winner');
      else if (m.winner) right.classList.add('loser');
      const rightName = document.createElement('span'); rightName.className = 'rr-name'; rightName.textContent = m.player2;
      const rightScore = document.createElement('span'); rightScore.className = 'rr-score';
      rightScore.textContent = m.score2 != null ? m.score2 : (m.winner === m.player2 ? 'W' : '');
      right.appendChild(rightName); right.appendChild(rightScore);

      card.appendChild(left); card.appendChild(vs); card.appendChild(right);
      if (!m.winner && m.player1 && m.player2) {
        card.addEventListener('click', () => openModal(rIdx, mIdx, false));
      }
      matchList.appendChild(card);
    });
    section.appendChild(matchList);
    rrArea.appendChild(section);
  });
}

function createMatchupElement(match, roundIdx, matchIdx, isConsolation) {
  const matchup = document.createElement('div');
  matchup.className = 'matchup';
  matchup.appendChild(createSlot(match.player1, match, 1, roundIdx, matchIdx, isConsolation));
  matchup.appendChild(createSlot(match.player2, match, 2, roundIdx, matchIdx, isConsolation));
  return matchup;
}

function createSlot(playerName, match, slotNum, roundIdx, matchIdx, isConsolation) {
  const slot = document.createElement('div');
  slot.className = 'match-slot';
  const advKey = (isConsolation ? 'c' : 'm') + roundIdx + '-' + matchIdx + '-' + slotNum;

  if (!playerName) {
    slot.classList.add('empty');
    const span = document.createElement('span');
    span.className = 'player-name';
    span.textContent = 'TBD';
    slot.appendChild(span);
    if (!match.player1 && !match.player2 && match.isBye) {
      slot.classList.remove('empty');
      slot.classList.add('bye');
      span.textContent = '—';
    }
    return slot;
  }

  if (justAdvancedSlots.has(advKey)) slot.classList.add('just-advanced');

  const nameSpan = document.createElement('span');
  nameSpan.className = 'player-name';
  nameSpan.textContent = playerName;
  slot.appendChild(nameSpan);

  if (match.winner === playerName) {
    slot.classList.add('winner');
    const badge = document.createElement('span');
    badge.className = 'score-badge';
    const scoreText = (slotNum === 1 && match.score1 !== null && match.score2 !== null)
      ? match.score1 + '-' + match.score2
      : (slotNum === 2 && match.score1 !== null && match.score2 !== null)
        ? match.score2 + '-' + match.score1
        : 'W';
    badge.textContent = scoreText;
    slot.appendChild(badge);
  } else if (match.winner && match.winner !== playerName) {
    slot.classList.add('loser');
  } else if (match.player1 && match.player2 && !match.winner && !match.isBye) {
    slot.classList.add('clickable');
    slot.addEventListener('click', () => openModal(roundIdx, matchIdx, isConsolation));
  }

  return slot;
}

// ─── CONSOLATION BRACKET ───
function checkAndBuildConsolation() {
  if (!tournament || !tournament.consolationEnabled || tournament.consolation) return;
  if (tournament.rounds.length < 2) return;

  const firstRound = tournament.rounds[0];
  const allFirstDone = firstRound.every(m => m.winner || m.isBye);
  if (!allFirstDone) return;

  const losers = [];
  firstRound.forEach(m => {
    if (m.isBye) return;
    if (m.winner && m.player1 && m.player2) {
      losers.push(m.winner === m.player1 ? m.player2 : m.player1);
    }
  });

  if (losers.length < 2) return;

  const n = losers.length;
  const bracketSize = nextPowerOf2(n);
  const totalRounds = Math.log2(bracketSize);
  const byeCount = bracketSize - n;

  const slots = new Array(bracketSize).fill(null);
  if (byeCount > 0) {
    const step = bracketSize / byeCount;
    const byePositions = new Set();
    for (let i = 0; i < byeCount; i++) byePositions.add(Math.round((i + 1) * step) - 1);
    let pi = 0;
    for (let i = 0; i < bracketSize; i++) slots[i] = byePositions.has(i) ? null : losers[pi++];
  } else {
    for (let i = 0; i < n; i++) slots[i] = losers[i];
  }

  const rounds = [];
  const firstCRound = [];
  for (let i = 0; i < bracketSize; i += 2) {
    const m = { player1: slots[i], player2: slots[i + 1], winner: null, isBye: false, score1: null, score2: null };
    if (!m.player1 && !m.player2) { m.isBye = true; }
    else if (!m.player1) { m.winner = m.player2; m.isBye = true; }
    else if (!m.player2) { m.winner = m.player1; m.isBye = true; }
    firstCRound.push(m);
  }
  rounds.push(firstCRound);
  for (let r = 1; r < totalRounds; r++) {
    const thisRound = [];
    for (let i = 0; i < rounds[r - 1].length; i += 2) {
      thisRound.push({ player1: null, player2: null, winner: null, isBye: false, score1: null, score2: null });
    }
    rounds.push(thisRound);
  }
  propagateByes(rounds);
  tournament.consolation = { rounds, participants: losers };
}

let _lastChampion = null;
function checkChampion() {
  if (!tournament) return;
  let champion = null;
  if (tournament.style === 'roundrobin') {
    champion = tournament.rrChampion || null;
  } else {
    const totalRounds = tournament.rounds.length;
    champion = tournament.rounds[totalRounds - 1][0].winner || null;
  }
  const champDisplay = document.getElementById('champion-display');
  const recapBtn = document.getElementById('recap-btn');
  if (champion) {
    champDisplay.classList.remove('hidden');
    document.getElementById('champion-name').textContent = champion;
    if (recapBtn) recapBtn.style.display = '';
    if (_lastChampion !== champion) {
      _lastChampion = champion;
      showChampionCelebration(champion);
    }
  } else {
    champDisplay.classList.add('hidden');
    if (recapBtn) recapBtn.style.display = 'none';
    _lastChampion = null;
  }
}

function showChampionCelebration(name) {
  document.getElementById('champ-celeb-name').textContent = name;
  const overlay = document.getElementById('champion-celebration');
  overlay.querySelectorAll('.champ-confetti').forEach(c => c.remove());
  overlay.classList.add('show');
  spawnConfetti(overlay);
}

function closeChampionCelebration() {
  const overlay = document.getElementById('champion-celebration');
  if (!overlay.classList.contains('show') || overlay.classList.contains('leaving')) return;
  overlay.classList.add('leaving');
  setTimeout(() => {
    overlay.classList.remove('show', 'leaving');
    overlay.querySelectorAll('.champ-confetti').forEach(c => c.remove());
  }, 400);
}

function spawnConfetti(parent) {
  const emojis = ['🎉','🎊','⭐','🏆','✨','🥳'];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'champ-confetti';
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + '%';
    c.style.animationDuration = (2.5 + Math.random() * 3) + 's';
    c.style.animationDelay = Math.random() * 1.5 + 's';
    parent.appendChild(c);
  }
}

// ─── MODAL (SCORE ENTRY + QUICK PICK) ───
function openModal(roundIdx, matchIdx, isConsolation) {
  const rounds = isConsolation ? tournament.consolation.rounds : tournament.rounds;
  const match = rounds[roundIdx][matchIdx];
  if (match.winner || !match.player1 || !match.player2) return;

  currentMatchInfo = { roundIdx, matchIdx, isConsolation: !!isConsolation };
  selectedWinner = null;

  // Score entry
  const scoreArea = document.getElementById('modal-score-entry');
  scoreArea.innerHTML = '';
  const scoreDiv = document.createElement('div');
  scoreDiv.className = 'score-entry';
  scoreDiv.innerHTML = '<div class="score-side"><label></label><input type="number" inputmode="numeric" pattern="[0-9]*" class="score-input" id="score-p1" min="0" max="99" placeholder="0"></div>' +
    '<div class="score-dash">–</div>' +
    '<div class="score-side"><label></label><input type="number" inputmode="numeric" pattern="[0-9]*" class="score-input" id="score-p2" min="0" max="99" placeholder="0"></div>';
  scoreDiv.querySelectorAll('label')[0].textContent = match.player1;
  scoreDiv.querySelectorAll('label')[1].textContent = match.player2;
  scoreArea.appendChild(scoreDiv);
  const hint = document.createElement('div');
  hint.className = 'score-hint';
  hint.textContent = 'First to 11, win by 2';
  scoreArea.appendChild(hint);

  document.getElementById('score-p1').addEventListener('input', onScoreInput);
  document.getElementById('score-p2').addEventListener('input', onScoreInput);

  // Quick pick players
  const modalMatch = document.getElementById('modal-match');
  modalMatch.innerHTML = '';
  [match.player1, match.player2].forEach((name, i) => {
    if (i === 1) {
      const vs = document.createElement('div');
      vs.className = 'modal-vs';
      vs.textContent = 'vs';
      modalMatch.appendChild(vs);
    }
    const div = document.createElement('div');
    div.className = 'modal-player';
    div.innerHTML = '<span class="name"></span><span class="check">✓</span>';
    div.querySelector('.name').textContent = name;
    div.addEventListener('click', () => {
      selectedWinner = name;
      // Clear score inputs when quick picking
      document.getElementById('score-p1').value = '';
      document.getElementById('score-p2').value = '';
      document.querySelectorAll('.modal-player').forEach(p => p.classList.remove('selected'));
      div.classList.add('selected');
      document.getElementById('modal-confirm').disabled = false;
    });
    modalMatch.appendChild(div);
  });

  document.getElementById('modal-confirm').disabled = true;
  document.getElementById('modal-overlay').classList.add('active');
}

function onScoreInput() {
  const s1 = parseInt(document.getElementById('score-p1').value);
  const s2 = parseInt(document.getElementById('score-p2').value);
  if (isNaN(s1) || isNaN(s2) || s1 < 0 || s2 < 0) {
    selectedWinner = null;
    document.getElementById('modal-confirm').disabled = true;
    document.querySelectorAll('.modal-player').forEach(p => p.classList.remove('selected'));
    return;
  }

  const max = Math.max(s1, s2);
  const min = Math.min(s1, s2);
  const valid = max >= 11 && (max - min) >= 2 && s1 !== s2;

  if (valid) {
    const rounds = currentMatchInfo.isConsolation ? tournament.consolation.rounds : tournament.rounds;
    const match = rounds[currentMatchInfo.roundIdx][currentMatchInfo.matchIdx];
    selectedWinner = s1 > s2 ? match.player1 : match.player2;

    // Highlight the winner in quick-pick
    document.querySelectorAll('.modal-player').forEach((p, i) => {
      const isWinner = (i === 0 && s1 > s2) || (i === 1 && s2 > s1);
      p.classList.toggle('selected', isWinner);
    });
    document.getElementById('modal-confirm').disabled = false;
  } else {
    selectedWinner = null;
    document.getElementById('modal-confirm').disabled = true;
    document.querySelectorAll('.modal-player').forEach(p => p.classList.remove('selected'));
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  currentMatchInfo = null; selectedWinner = null;
}

function confirmWinner() {
  if (!selectedWinner || !currentMatchInfo) return;

  const { roundIdx, matchIdx, isConsolation } = currentMatchInfo;
  const rounds = isConsolation ? tournament.consolation.rounds : tournament.rounds;
  const match = rounds[roundIdx][matchIdx];
  const loser = match.player1 === selectedWinner ? match.player2 : match.player1;

  undoStack.push({
    tournament: JSON.parse(JSON.stringify(tournament)),
    lifetimeStats: JSON.parse(JSON.stringify(lifetimeStats)),
    weeklyHistory: JSON.parse(JSON.stringify(weeklyHistory))
  });

  match.winner = selectedWinner;
  const s1 = parseInt(document.getElementById('score-p1').value);
  const s2 = parseInt(document.getElementById('score-p2').value);
  if (!isNaN(s1) && !isNaN(s2) && s1 >= 0 && s2 >= 0) {
    match.score1 = s1; match.score2 = s2;
  }

  tournament.results.push({ winner: selectedWinner, loser, score1: match.score1, score2: match.score2, consolation: isConsolation });

  // Update stats
  ensurePlayerStats(selectedWinner);
  ensurePlayerStats(loser);
  lifetimeStats[selectedWinner].wins++;
  lifetimeStats[loser].losses++;

  // Streaks
  lifetimeStats[selectedWinner].currentStreak++;
  if (lifetimeStats[selectedWinner].currentStreak > lifetimeStats[selectedWinner].longestWinStreak) {
    lifetimeStats[selectedWinner].longestWinStreak = lifetimeStats[selectedWinner].currentStreak;
  }
  lifetimeStats[loser].currentStreak = 0;

  // H2H
  if (!lifetimeStats[selectedWinner].h2h[loser]) lifetimeStats[selectedWinner].h2h[loser] = { w: 0, l: 0 };
  if (!lifetimeStats[loser].h2h[selectedWinner]) lifetimeStats[loser].h2h[selectedWinner] = { w: 0, l: 0 };
  lifetimeStats[selectedWinner].h2h[loser].w++;
  lifetimeStats[loser].h2h[selectedWinner].l++;

  const totalRounds = rounds.length;
  const isRoundRobin = tournament.style === 'roundrobin';

  if (!isRoundRobin && roundIdx < totalRounds - 1) {
    const nextMatchIdx = Math.floor(matchIdx / 2);
    const nextMatch = rounds[roundIdx + 1][nextMatchIdx];
    if (matchIdx % 2 === 0) { nextMatch.player1 = selectedWinner; }
    else { nextMatch.player2 = selectedWinner; }
    const slotNum = matchIdx % 2 === 0 ? 1 : 2;
    const advKey = (isConsolation ? 'c' : 'm') + (roundIdx + 1) + '-' + nextMatchIdx + '-' + slotNum;
    justAdvancedSlots.add(advKey);
  }

  if (!isRoundRobin && !isConsolation && roundIdx === totalRounds - 1) {
    ensurePlayerStats(selectedWinner);
    lifetimeStats[selectedWinner].championships++;
    saveTournamentToHistory();
  }

  // Round-robin: when all matches complete, crown the standings leader.
  if (isRoundRobin && isRoundRobinComplete() && !tournament.rrChampion) {
    const standings = computeStandings(tournament.rounds, tournament.participants);
    tournament.rrChampion = standings[0].name;
    ensurePlayerStats(tournament.rrChampion);
    lifetimeStats[tournament.rrChampion].championships++;
    saveTournamentToHistory();
  }

  // Detect achievements for both winner and loser
  const newBadges = detectAchievements(selectedWinner, loser, match);

  // Build consolation after first round completes (bracket only)
  if (!isRoundRobin && !isConsolation) checkAndBuildConsolation();

  closeModal();
  renderBracket();
  const scoreText = match.score1 !== null ? ' (' + match.score1 + '-' + match.score2 + ')' : '';
  showToast(selectedWinner + ' wins' + scoreText, 'Undo', undoLastResult);

  // Stagger badge toasts so they appear after the win toast.
  newBadges.forEach((b, i) => {
    setTimeout(() => showAchievementToast(b.player, b.badge), 800 + i * 600);
  });

  saveStats();
  saveTournamentState();
}

function saveTournamentToHistory() {
  const champion = tournament.style === 'roundrobin'
    ? tournament.rrChampion
    : tournament.rounds[tournament.rounds.length - 1][0].winner;
  weeklyHistory.push({
    week: tournament.week, date: tournament.date,
    format: tournament.format,
    style: tournament.style || 'bracket',
    champion,
    participants: tournament.participants,
    results: tournament.results
  });
  saveData('pb_weekly', weeklyHistory);
}

function saveStats() { saveData('pb_lifetime', lifetimeStats); }

// ─── ACHIEVEMENTS ───
const BADGE_CATALOG = {
  first_win: { icon: '🌱', name: 'First Win', desc: 'Won your first match' },
  first_title: { icon: '🏆', name: 'First Title', desc: 'Won your first tournament' },
  dynasty: { icon: '👑', name: 'Dynasty', desc: '3+ tournament titles' },
  streak_5: { icon: '🔥', name: 'On Fire', desc: '5-game win streak' },
  streak_10: { icon: '⚡', name: 'Unstoppable', desc: '10-game win streak' },
  bagel: { icon: '🥯', name: 'Skunk Master', desc: 'Won without conceding a point' },
  century: { icon: '💯', name: 'Century', desc: '100 lifetime wins' },
  giant_slayer: { icon: '🗡️', name: 'Giant Slayer', desc: 'Beat the all-time titles leader' }
};

function awardBadge(player, badgeId) {
  ensurePlayerStats(player);
  const stats = lifetimeStats[player];
  if (!stats.badges) stats.badges = {};
  if (stats.badges[badgeId]) return false;
  stats.badges[badgeId] = new Date().toISOString().slice(0, 10);
  return true;
}

function detectAchievements(winner, loser, match) {
  const earned = [];
  ensurePlayerStats(winner);
  const wStats = lifetimeStats[winner];

  if (wStats.wins === 1 && awardBadge(winner, 'first_win')) earned.push({ player: winner, badge: 'first_win' });
  if (wStats.championships === 1 && awardBadge(winner, 'first_title')) earned.push({ player: winner, badge: 'first_title' });
  if (wStats.championships >= 3 && awardBadge(winner, 'dynasty')) earned.push({ player: winner, badge: 'dynasty' });
  if (wStats.currentStreak >= 5 && awardBadge(winner, 'streak_5')) earned.push({ player: winner, badge: 'streak_5' });
  if (wStats.currentStreak >= 10 && awardBadge(winner, 'streak_10')) earned.push({ player: winner, badge: 'streak_10' });
  if (wStats.wins >= 100 && awardBadge(winner, 'century')) earned.push({ player: winner, badge: 'century' });

  // Bagel: opponent scored 0
  if (match.score1 != null && match.score2 != null) {
    const winnerScore = match.winner === match.player1 ? match.score1 : match.score2;
    const loserScore = match.winner === match.player1 ? match.score2 : match.score1;
    if (winnerScore > 0 && loserScore === 0 && awardBadge(winner, 'bagel')) earned.push({ player: winner, badge: 'bagel' });
  }

  // Giant slayer: winner has fewer titles than loser AND loser has the all-time most titles
  ensurePlayerStats(loser);
  const lStats = lifetimeStats[loser];
  const allTimeTopTitles = Object.values(lifetimeStats).reduce((m, s) => Math.max(m, s.championships || 0), 0);
  if ((lStats.championships || 0) >= allTimeTopTitles && allTimeTopTitles > 0 &&
      (wStats.championships || 0) < (lStats.championships || 0) &&
      awardBadge(winner, 'giant_slayer')) {
    earned.push({ player: winner, badge: 'giant_slayer' });
  }

  return earned;
}

function showAchievementToast(player, badgeId) {
  const b = BADGE_CATALOG[badgeId];
  if (!b) return;
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast achievement-toast';
  toast.innerHTML = '<span class="ach-icon">' + b.icon + '</span><span class="ach-text"><strong>' + escHtml(player) + '</strong> earned <em>' + b.name + '</em></span>';
  container.appendChild(toast);
  setTimeout(() => removeToast(toast), 5000);
}

// ─── UNDO ───
function undoLastResult() {
  const snapshot = undoStack.pop();
  if (!snapshot) return;
  tournament = snapshot.tournament;
  lifetimeStats = snapshot.lifetimeStats;
  weeklyHistory = snapshot.weeklyHistory;
  saveData('pb_lifetime', lifetimeStats);
  saveData('pb_weekly', weeklyHistory);
  // Re-prime _lastChampion to the rehydrated final winner (if any),
  // so undoing a non-final match doesn't re-fire the celebration.
  const finalWinner = tournament.rounds[tournament.rounds.length - 1][0].winner;
  _lastChampion = finalWinner || null;
  saveTournamentState();
  renderBracket();
}

// ─── SHARE RESULTS ───
function shareResults() {
  if (!tournament) return;
  let text = 'Pickleball Tournament - Week ' + tournament.week + '\n';
  text += tournament.date + ' | ' + tournament.format.charAt(0).toUpperCase() + tournament.format.slice(1) + '\n\n';

  const champ = tournament.rounds[tournament.rounds.length - 1][0].winner;
  if (champ) text += '🏆 Champion: ' + champ + '\n\n';

  text += 'Results:\n';
  tournament.results.filter(r => !r.consolation).forEach(r => {
    const score = (r.score1 !== null && r.score2 !== null) ? ' (' + r.score1 + '-' + r.score2 + ')' : '';
    text += '• ' + r.winner + ' def. ' + r.loser + score + '\n';
  });

  function copyFallback() {
    if (!navigator.clipboard) { showToast('Sharing not supported on this device'); return; }
    navigator.clipboard.writeText(text)
      .then(() => showToast('Results copied to clipboard'))
      .catch(() => showToast('Could not copy results'));
  }
  if (navigator.share) {
    navigator.share({ title: 'Pickleball Tournament Results', text }).catch((err) => {
      if (err && err.name === 'AbortError') return; // user cancelled the share sheet
      copyFallback();
    });
  } else {
    copyFallback();
  }
}

// ─── STATS RENDERING ───
function showStatsView(view) {
  document.querySelectorAll('.stats-toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.stats-view').forEach(v => v.classList.remove('active'));

  const btns = document.querySelectorAll('.stats-toggle-btn');
  if (view === 'lifetime') {
    btns[0].classList.add('active');
    document.getElementById('stats-lifetime').classList.add('active');
    renderLifetimeStats();
  } else if (view === 'h2h') {
    btns[1].classList.add('active');
    document.getElementById('stats-h2h').classList.add('active');
    renderH2HView();
  } else {
    btns[2].classList.add('active');
    document.getElementById('stats-weekly').classList.add('active');
    renderWeeklyHistory();
  }
}

function renderLifetimeStats() {
  const container = document.getElementById('stats-lifetime');
  const entries = Object.entries(lifetimeStats).filter(([_, s]) => s.wins > 0 || s.losses > 0);

  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-stats"><div class="icon">📊</div><p>No stats yet. Play a tournament to see the leaderboard!</p></div>';
    return;
  }

  entries.sort((a, b) => {
    if (b[1].championships !== a[1].championships) return b[1].championships - a[1].championships;
    if (b[1].wins !== a[1].wins) return b[1].wins - a[1].wins;
    const aTotal = a[1].wins + a[1].losses;
    const bTotal = b[1].wins + b[1].losses;
    return (bTotal > 0 ? b[1].wins / bTotal : 0) - (aTotal > 0 ? a[1].wins / aTotal : 0);
  });

  let html = '<table class="leaderboard-table"><thead><tr><th>#</th><th>Player</th><th>W</th><th>L</th><th>Win %</th><th>Streak</th><th>🏆</th></tr></thead><tbody>';
  entries.forEach(([name, stats], i) => {
    ensurePlayerStats(name);
    const total = stats.wins + stats.losses;
    const pct = total > 0 ? Math.round((stats.wins / total) * 100) : 0;
    const streak = stats.currentStreak > 0 ? stats.currentStreak + 'W' : '—';
    html += '<tr><td class="rank">' + (i + 1) + '</td><td class="player-cell" data-name="' + escAttr(name) + '">' + escHtml(name) + '</td><td class="wins-cell">' + stats.wins + '</td><td class="losses-cell">' + stats.losses + '</td><td>' + pct + '%</td><td class="streak-cell">' + streak + '</td><td class="champ-cell">' + (stats.championships || '—') + '</td></tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
  container.querySelectorAll('[data-name]').forEach(el => {
    el.addEventListener('click', () => openProfile(el.getAttribute('data-name')));
  });
}

function renderH2HView() {
  const container = document.getElementById('stats-h2h');
  const players = Object.entries(lifetimeStats).filter(([_, s]) => s.wins > 0 || s.losses > 0);

  if (players.length === 0) {
    container.innerHTML = '<div class="empty-stats"><div class="icon">🤼</div><p>No head-to-head records yet.</p></div>';
    return;
  }

  let html = '<div class="h2h-grid">';
  players.sort((a, b) => a[0].localeCompare(b[0]));
  players.forEach(([name, stats]) => {
    ensurePlayerStats(name);
    const h2hEntries = Object.entries(stats.h2h || {}).filter(([_, r]) => r.w > 0 || r.l > 0);
    const totalW = h2hEntries.reduce((s, [_, r]) => s + r.w, 0);
    const totalL = h2hEntries.reduce((s, [_, r]) => s + r.l, 0);
    html += '<div class="h2h-card" data-name="' + escAttr(name) + '">' +
      '<div class="h2h-card-name">' + escHtml(name) + '</div>' +
      '<div class="h2h-card-record">' + totalW + 'W - ' + totalL + 'L | ' + h2hEntries.length + ' opponents</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
  container.querySelectorAll('[data-name]').forEach(el => {
    el.addEventListener('click', () => openProfile(el.getAttribute('data-name')));
  });
}

function renderWeeklyHistory() {
  const container = document.getElementById('stats-weekly');
  if (weeklyHistory.length === 0) {
    container.innerHTML = '<div class="empty-stats"><div class="icon">📅</div><p>No tournament history yet.</p></div>';
    return;
  }

  let html = '';
  [...weeklyHistory].reverse().forEach(week => {
    html += '<div class="week-history-item"><h3>Week ' + week.week + '</h3>' +
      '<div class="week-date">' + week.date + ' · ' + week.format.charAt(0).toUpperCase() + week.format.slice(1) + ' · ' + week.participants.length + ' ' + (week.format === 'doubles' ? 'teams' : 'players') + '</div>' +
      '<div class="week-champ">🏆 ' + escHtml(week.champion) + '</div>' +
      '<div class="week-results">' +
      week.results.filter(r => !r.consolation).map(r => {
        const score = (r.score1 !== null && r.score2 !== null) ? ' <span style="color:var(--accent);font-size:11px">(' + r.score1 + '-' + r.score2 + ')</span>' : '';
        return escHtml(r.winner) + ' <span style="color:var(--text3)">defeated</span> ' + escHtml(r.loser) + score;
      }).join('<br>') +
      '</div></div>';
  });
  container.innerHTML = html;
}

// ─── PLAYER PROFILE ───
function openProfile(name) {
  ensurePlayerStats(name);
  const stats = lifetimeStats[name];
  const total = stats.wins + stats.losses;
  const pct = total > 0 ? Math.round((stats.wins / total) * 100) : 0;

  let title = 'Newcomer';
  if (stats.championships >= 5) title = 'Hall of Famer';
  else if (stats.championships >= 3) title = 'Dynasty Builder';
  else if (stats.championships >= 1) title = 'Champion';
  else if (stats.wins >= 20) title = 'Veteran';
  else if (stats.wins >= 10) title = 'Competitor';
  else if (pct >= 70 && total >= 5) title = 'Sharpshooter';

  const modal = document.getElementById('profile-modal');
  let html = '<button class="profile-close" onclick="closeProfile()">&times;</button>';
  html += '<div class="profile-name">' + escHtml(name) + '</div>';
  html += '<div class="profile-title">' + title + '</div>';
  html += '<div class="profile-stats-grid">';
  html += '<div class="profile-stat-box"><div class="profile-stat-val green">' + stats.wins + '</div><div class="profile-stat-label">Wins</div></div>';
  html += '<div class="profile-stat-box"><div class="profile-stat-val red">' + stats.losses + '</div><div class="profile-stat-label">Losses</div></div>';
  html += '<div class="profile-stat-box"><div class="profile-stat-val gold">' + (stats.championships || 0) + '</div><div class="profile-stat-label">Titles</div></div>';
  html += '<div class="profile-stat-box"><div class="profile-stat-val">' + pct + '%</div><div class="profile-stat-label">Win Rate</div></div>';
  html += '<div class="profile-stat-box"><div class="profile-stat-val">' + (stats.currentStreak || 0) + '</div><div class="profile-stat-label">Current Streak</div></div>';
  html += '<div class="profile-stat-box"><div class="profile-stat-val">' + (stats.longestWinStreak || 0) + '</div><div class="profile-stat-label">Best Streak</div></div>';
  html += '</div>';

  const badgeIds = Object.keys(stats.badges || {});
  if (badgeIds.length > 0) {
    html += '<div class="profile-h2h-title">Achievements</div><div class="profile-badges">';
    badgeIds.forEach(id => {
      const b = BADGE_CATALOG[id];
      if (!b) return;
      html += '<div class="badge-chip" title="' + escAttr(b.desc) + '"><span class="badge-icon">' + b.icon + '</span><span class="badge-name">' + escHtml(b.name) + '</span></div>';
    });
    html += '</div>';
  }

  const h2hEntries = Object.entries(stats.h2h || {}).filter(([_, r]) => r.w > 0 || r.l > 0);
  if (h2hEntries.length > 0) {
    html += '<div class="profile-h2h-title">Head-to-Head</div><div class="profile-h2h-list">';
    h2hEntries.sort((a, b) => (b[1].w + b[1].l) - (a[1].w + a[1].l));
    h2hEntries.forEach(([opp, record]) => {
      const cls = record.w > record.l ? 'positive' : record.w < record.l ? 'negative' : 'even';
      html += '<div class="profile-h2h-row"><span class="opp">' + escHtml(opp) + '</span><span class="record ' + cls + '">' + record.w + 'W - ' + record.l + 'L</span></div>';
    });
    html += '</div>';
  }

  modal.innerHTML = html;
  document.getElementById('profile-overlay').classList.add('active');
}

function closeProfile() {
  document.getElementById('profile-overlay').classList.remove('active');
}

// ─── RECAP CARD ───
function buildRecapData() {
  if (!tournament) return null;
  const isRR = tournament.style === 'roundrobin';
  const champion = isRR
    ? tournament.rrChampion
    : tournament.rounds[tournament.rounds.length - 1][0].winner;
  if (!champion) return null;

  // Runner-up
  let runnerUp = null;
  if (isRR) {
    const standings = computeStandings(tournament.rounds, tournament.participants);
    runnerUp = standings[1] ? standings[1].name : null;
  } else {
    const final = tournament.rounds[tournament.rounds.length - 1][0];
    runnerUp = final.winner === final.player1 ? final.player2 : final.player1;
  }

  const completed = tournament.results.filter(r => !r.consolation);

  // Player of the night = most wins tonight
  const winsTonight = {};
  const lossesTonight = {};
  completed.forEach(r => {
    winsTonight[r.winner] = (winsTonight[r.winner] || 0) + 1;
    lossesTonight[r.loser] = (lossesTonight[r.loser] || 0) + 1;
  });
  let mvp = champion, mvpWins = winsTonight[champion] || 0;
  Object.entries(winsTonight).forEach(([p, w]) => {
    if (w > mvpWins || (w === mvpWins && p === champion)) { mvp = p; mvpWins = w; }
  });

  // Longest streak of the night (within the tournament's match order)
  const streak = {};
  let bestStreakOwner = null, bestStreakLen = 0;
  completed.forEach(r => {
    streak[r.winner] = (streak[r.winner] || 0) + 1;
    streak[r.loser] = 0;
    if (streak[r.winner] > bestStreakLen) {
      bestStreakLen = streak[r.winner];
      bestStreakOwner = r.winner;
    }
  });

  // Closest match (smallest score gap among completed-with-scores)
  let closest = null;
  let blowout = null;
  completed.forEach(r => {
    if (r.score1 == null || r.score2 == null) return;
    const gap = Math.abs(r.score1 - r.score2);
    if (closest === null || gap < closest.gap) closest = { ...r, gap };
    if (blowout === null || gap > blowout.gap) blowout = { ...r, gap };
  });

  return {
    week: tournament.week, date: tournament.date,
    style: isRR ? 'Round Robin' : 'Bracket',
    format: tournament.format,
    champion, runnerUp,
    matchesPlayed: completed.length,
    mvp, mvpWins,
    bestStreakOwner, bestStreakLen,
    closest, blowout
  };
}

function showRecap() {
  const data = buildRecapData();
  if (!data) { showToast('No recap available yet'); return; }
  const card = document.getElementById('recap-card');
  let html = '<button class="profile-close" onclick="closeRecap()">&times;</button>';
  html += '<div class="recap-header"><div class="recap-title">Week ' + data.week + ' Recap</div>';
  html += '<div class="recap-date">' + escHtml(data.date) + ' · ' + escHtml(data.format) + ' · ' + data.style + '</div></div>';
  html += '<div class="recap-champ-row"><div class="recap-trophy">🏆</div><div class="recap-champ-block"><div class="recap-label">Champion</div><div class="recap-champ-name">' + escHtml(data.champion) + '</div>';
  if (data.runnerUp) html += '<div class="recap-runner">Runner-up: ' + escHtml(data.runnerUp) + '</div>';
  html += '</div></div>';

  html += '<div class="recap-stats">';
  html += recapStatHTML('Matches played', data.matchesPlayed);
  if (data.mvp && data.mvpWins > 0) html += recapStatHTML('Player of the night', data.mvp + ' (' + data.mvpWins + 'W)');
  if (data.bestStreakOwner && data.bestStreakLen >= 2) html += recapStatHTML('Hottest streak', data.bestStreakOwner + ' (' + data.bestStreakLen + ' in a row)');
  if (data.closest) html += recapStatHTML('Closest match', data.closest.winner + ' def. ' + data.closest.loser + ' (' + data.closest.score1 + '–' + data.closest.score2 + ')');
  if (data.blowout && data.blowout.gap >= 5) html += recapStatHTML('Biggest blowout', data.blowout.winner + ' def. ' + data.blowout.loser + ' (' + data.blowout.score1 + '–' + data.blowout.score2 + ')');
  html += '</div>';

  html += '<button class="recap-share-btn" onclick="shareRecap()">Share recap</button>';
  card.innerHTML = html;
  document.getElementById('recap-overlay').classList.add('active');
}

function recapStatHTML(label, value) {
  return '<div class="recap-stat"><div class="recap-stat-label">' + escHtml(label) + '</div><div class="recap-stat-value">' + escHtml(String(value)) + '</div></div>';
}

function closeRecap() {
  document.getElementById('recap-overlay').classList.remove('active');
}

function shareRecap() {
  const data = buildRecapData();
  if (!data) return;
  let text = '🏓 Pickleball — Week ' + data.week + ' Recap\n';
  text += data.date + ' · ' + data.format + ' · ' + data.style + '\n\n';
  text += '🏆 Champion: ' + data.champion + '\n';
  if (data.runnerUp) text += '🥈 Runner-up: ' + data.runnerUp + '\n';
  text += '\nMatches played: ' + data.matchesPlayed + '\n';
  if (data.mvp && data.mvpWins > 0) text += 'Player of the night: ' + data.mvp + ' (' + data.mvpWins + 'W)\n';
  if (data.bestStreakOwner && data.bestStreakLen >= 2) text += 'Hottest streak: ' + data.bestStreakOwner + ' (' + data.bestStreakLen + ')\n';
  if (data.closest) text += 'Closest match: ' + data.closest.winner + ' def. ' + data.closest.loser + ' (' + data.closest.score1 + '–' + data.closest.score2 + ')\n';
  if (data.blowout && data.blowout.gap >= 5) text += 'Biggest blowout: ' + data.blowout.winner + ' def. ' + data.blowout.loser + ' (' + data.blowout.score1 + '–' + data.blowout.score2 + ')\n';

  function copyFallback() {
    if (!navigator.clipboard) { showToast('Sharing not supported on this device'); return; }
    navigator.clipboard.writeText(text)
      .then(() => showToast('Recap copied to clipboard'))
      .catch(() => showToast('Could not copy recap'));
  }
  if (navigator.share) {
    navigator.share({ title: 'Pickleball Recap', text }).catch((err) => {
      if (err && err.name === 'AbortError') return;
      copyFallback();
    });
  } else {
    copyFallback();
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── RESET ───
function resetWeeklyStats() {
  if (!confirm('Clear all tournament history? Lifetime stats and the current bracket will be kept.')) return;
  weeklyHistory = [];
  saveData('pb_weekly', weeklyHistory);
  renderWeeklyHistory();
}

function resetAllStats() {
  if (!confirm('Reset ALL stats including lifetime leaderboard? This cannot be undone.')) return;
  lifetimeStats = {};
  weeklyHistory = [];
  saveData('pb_lifetime', lifetimeStats);
  saveData('pb_weekly', weeklyHistory);
  renderLifetimeStats();
  renderWeeklyHistory();
}

// ─── NAVIGATION ───
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[['setup', 'bracket', 'stats'].indexOf(name)].classList.add('active');
  if (name === 'stats') showStatsView('lifetime');
  if (name === 'bracket') {
    updateBracketScreenState();
    if (tournament) renderBracket();
  }
}

function updateBracketScreenState() {
  const empty = document.getElementById('bracket-empty');
  const content = document.getElementById('bracket-content');
  if (tournament) { empty.style.display = 'none'; content.style.display = ''; }
  else { empty.style.display = ''; content.style.display = 'none'; }
}

// ─── INIT ───
initPlayerInputs();
const savedConsolation = loadData('pb_opt_consolation', true);
document.getElementById('opt-consolation').checked = savedConsolation !== false;
const savedFormat = loadData('pb_format', null);
if (savedFormat === 'doubles' || savedFormat === 'singles') setFormat(savedFormat);
const savedStyle = loadData('pb_style', null);
if (savedStyle === 'bracket' || savedStyle === 'roundrobin') setStyle(savedStyle);
validateSetup();
loadTournamentState();
updateBracketScreenState();

let _resizeTimer;
function _handleViewportChange() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (tournament && document.getElementById('screen-bracket').classList.contains('active')) {
      renderBracket();
    }
  }, 200);
}
window.addEventListener('resize', _handleViewportChange);
window.addEventListener('orientationchange', () => {
  setTimeout(_handleViewportChange, 250);
});

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  const champ = document.getElementById('champion-celebration');
  if (champ.classList.contains('show')) { closeChampionCelebration(); return; }
  const recap = document.getElementById('recap-overlay');
  if (recap.classList.contains('active')) { closeRecap(); return; }
  const profile = document.getElementById('profile-overlay');
  if (profile.classList.contains('active')) { closeProfile(); return; }
  const modal = document.getElementById('modal-overlay');
  if (modal.classList.contains('active')) { closeModal(); return; }
});
</script>
