<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Tournament</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── THEME VARIABLES ─── */
  [data-theme="dark"] {
    --bg: #1a1d23; --bg2: #22262e; --bg3: #2a2f38;
    --card: #2e333d; --card-hover: #363b47;
    --accent: #f5a623; --accent2: #e8941e;
    --green: #4caf50; --red: #e74c3c;
    --text: #e8e8e8; --text2: #9a9faa; --text3: #6b7080;
    --border: #3a3f4a; --connector: #4a4f5a;
    --winner-bg: #2d4a2d; --loser-bg: #4a2d2d;
    --modal-bg: rgba(0,0,0,0.7); --shadow: rgba(0,0,0,0.4);
  }
  [data-theme="light"] {
    --bg: #f0f2f5; --bg2: #ffffff; --bg3: #e4e7ec;
    --card: #ffffff; --card-hover: #f7f8fa;
    --accent: #e8941e; --accent2: #d4820f;
    --green: #2e7d32; --red: #c62828;
    --text: #1a1d23; --text2: #5a6070; --text3: #8a8f9a;
    --border: #d0d5dd; --connector: #b0b5c0;
    --winner-bg: #d4edda; --loser-bg: #f8d7da;
    --modal-bg: rgba(0,0,0,0.4); --shadow: rgba(0,0,0,0.12);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; transition: background 0.3s, color 0.3s;
  }

  /* ─── HEADER ─── */
  .app-header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
    transition: background 0.3s;
  }
  .app-header h1 {
    font-size: 22px; font-weight: 800;
    display: flex; align-items: center; gap: 10px;
  }
  .app-header h1 span { font-size: 26px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .nav-tabs {
    display: flex; gap: 4px; background: var(--bg);
    border-radius: 10px; padding: 4px;
  }
  .nav-tab {
    padding: 8px 18px; border-radius: 8px; border: none;
    background: transparent; color: var(--text2); font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .nav-tab.active { background: var(--accent); color: #000; }
  .nav-tab:hover:not(.active) { color: var(--text); background: var(--bg3); }

  /* Theme toggle */
  .theme-toggle {
    width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text2); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── SCREENS ─── */
  .screen { display: none; padding: 24px; }
  .screen.active { display: block; }

  /* ─── SETUP SCREEN ─── */
  .setup-container { max-width: 600px; margin: 0 auto; padding-top: 20px; }
  .setup-section {
    background: var(--bg2); border-radius: 14px; padding: 24px;
    margin-bottom: 20px; border: 1px solid var(--border); transition: background 0.3s;
  }
  .setup-section h2 {
    font-weight: 700; margin-bottom: 16px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; font-size: 13px;
  }
  .format-toggle { display: flex; gap: 8px; }
  .format-btn {
    flex: 1; padding: 14px; border-radius: 10px;
    border: 2px solid var(--border); background: var(--bg);
    color: var(--text2); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .format-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(245,166,35,0.08);
  }
  .format-btn small { display: block; font-size: 11px; font-weight: 400; margin-top: 4px; color: var(--text3); }

  .player-input-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .player-num {
    width: 28px; height: 28px; border-radius: 50%; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text3); flex-shrink: 0;
  }
  .player-input-row input {
    flex: 1; padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 16px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .player-input-row input:focus { border-color: var(--accent); }
  .player-input-row input::placeholder { color: var(--text3); }
  .remove-player-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    background: transparent; color: var(--text3); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .remove-player-btn:hover:not(:disabled) { background: var(--red); color: #fff; }
  .remove-player-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .add-player-btn {
    width: 100%; padding: 10px; border-radius: 8px;
    border: 2px dashed var(--border); background: transparent;
    color: var(--text3); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .add-player-btn:hover { border-color: var(--accent); color: var(--accent); }

  .setup-checkbox {
    display: flex; align-items: center; gap: 10px; margin-top: 16px;
    cursor: pointer; font-size: 14px; color: var(--text2);
  }
  .setup-checkbox input { accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; }

  .start-btn {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: var(--accent); color: #000; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
  }
  .start-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .doubles-note {
    background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.2);
    border-radius: 8px; padding: 10px 14px; font-size: 12px;
    color: var(--accent); margin-bottom: 16px; line-height: 1.5;
  }

  /* ─── BRACKET SCREEN ─── */
  .bracket-header { text-align: center; margin-bottom: 8px; }
  .bracket-header h2 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .bracket-header .week-info { color: var(--text2); font-size: 14px; }
  .bracket-header .format-badge {
    display: inline-block; background: var(--accent); color: #000;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; margin-left: 8px; text-transform: uppercase;
  }
  .bracket-actions {
    display: flex; justify-content: center; gap: 8px; margin-top: 10px;
  }
  .bracket-action-btn {
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .bracket-action-btn:hover { border-color: var(--accent); color: var(--accent); }

  .bracket-wrapper { overflow-x: auto; padding: 10px 0 20px; }

  .bracket-labels {
    display: grid; margin-bottom: 8px; padding: 0 20px;
  }
  .bracket-labels .round-label {
    text-align: center; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text3); padding: 8px 0;
  }

  .bracket-grid { display: grid; padding: 0 20px; }

  /* Matchups */
  .matchup { position: relative; }

  .match-slot {
    background: var(--card); border: 1px solid var(--border);
    padding: 10px 14px; font-size: 13px; font-weight: 500;
    cursor: default; transition: all 0.15s;
    display: flex; align-items: center; justify-content: space-between;
    min-height: 36px; white-space: nowrap; overflow: hidden;
  }
  .match-slot:first-child { border-radius: 6px 6px 0 0; }
  .match-slot:last-child { border-radius: 0 0 6px 6px; border-top: 1px solid var(--bg); }

  .match-slot.empty { color: var(--text3); font-style: italic; }
  .match-slot.bye { color: var(--text3); font-style: italic; background: var(--bg3); }

  .match-slot.clickable { cursor: pointer; }
  .match-slot.clickable:hover {
    background: var(--card-hover); border-color: var(--accent);
    z-index: 2; position: relative;
  }

  .match-slot.winner {
    background: var(--winner-bg); border-color: var(--green);
    color: var(--green); font-weight: 700;
  }
  .match-slot.loser {
    background: var(--loser-bg); opacity: 0.6; text-decoration: line-through;
  }

  .match-slot .player-name {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis;
  }
  .match-slot .score-badge {
    font-size: 10px; font-weight: 700; color: var(--accent); margin-left: 8px;
  }

  /* Advance animation */
  @keyframes advanceIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .match-slot.just-advanced { animation: advanceIn 0.4s ease-out; }

  /* ─── BRACKET CONNECTORS ─── */
  .bracket-conn { position: relative; }

  .bracket-conn-left::before {
    content: ''; position: absolute;
    top: 25%; bottom: 25%; left: 0; right: 50%;
    border-top: 2px solid var(--connector);
    border-right: 2px solid var(--connector);
    border-bottom: 2px solid var(--connector);
  }
  .bracket-conn-left::after {
    content: ''; position: absolute;
    top: calc(50% - 1px); left: calc(50% - 1px); right: 0;
    border-top: 2px solid var(--connector);
  }

  .bracket-conn-right::before {
    content: ''; position: absolute;
    top: 25%; bottom: 25%; left: 50%; right: 0;
    border-top: 2px solid var(--connector);
    border-left: 2px solid var(--connector);
    border-bottom: 2px solid var(--connector);
  }
  .bracket-conn-right::after {
    content: ''; position: absolute;
    top: calc(50% - 1px); left: 0; right: calc(50% - 1px);
    border-top: 2px solid var(--connector);
  }

  .bracket-conn-line::before {
    content: ''; position: absolute;
    top: calc(50% - 1px); left: 0; right: 0;
    border-top: 2px solid var(--connector);
  }

  /* ─── CONSOLATION BRACKET ─── */
  .consolation-section {
    margin-top: 40px; padding-top: 24px;
    border-top: 2px dashed var(--border);
  }
  .consolation-section h3 {
    text-align: center; font-size: 18px; font-weight: 700;
    margin-bottom: 6px; color: var(--text2);
  }
  .consolation-section .consolation-subtitle {
    text-align: center; font-size: 12px; color: var(--text3); margin-bottom: 16px;
  }

  /* Champion */
  .champion-display { text-align: center; padding: 40px 20px; margin-top: 20px; }
  .champion-display.hidden { display: none; }
  .champion-trophy { font-size: 64px; margin-bottom: 12px; }
  .champion-label {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: var(--accent); margin-bottom: 8px;
  }
  .champion-name { font-size: 32px; font-weight: 800; }
  .new-tournament-btn {
    margin-top: 24px; padding: 12px 32px; border-radius: 10px;
    border: 2px solid var(--accent); background: transparent;
    color: var(--accent); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .new-tournament-btn:hover { background: var(--accent); color: #000; }

  /* Champion celebration */
  .champion-celebration {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
    flex-direction: column; padding: 20px; overflow: hidden;
    animation: champ-fade-in 0.4s ease-out;
  }
  .champion-celebration.show { display: flex; }
  .champion-celebration.leaving { animation: champ-fade-out 0.4s ease forwards; pointer-events: none; }
  @keyframes champ-fade-out { to { opacity: 0; } }
  .champ-trophy-big {
    font-size: 180px; line-height: 1; margin-bottom: 12px;
    filter: drop-shadow(0 0 40px rgba(245,166,35,0.6));
    animation: champ-trophy-pop 0.8s cubic-bezier(.18,.89,.32,1.28) both,
               champ-trophy-pulse 2.4s ease-in-out 0.8s infinite;
  }
  .champ-celeb-label {
    font-size: 14px; font-weight: 800; letter-spacing: 5px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 14px;
    animation: champ-fade-up 0.5s ease-out 0.4s both;
  }
  .champ-celeb-name {
    font-size: 44px; font-weight: 800; color: #fff;
    text-align: center; line-height: 1.15;
    text-shadow: 0 0 30px rgba(245,166,35,0.4);
    margin-bottom: 36px; max-width: 90vw;
    animation: champ-fade-up 0.5s ease-out 0.6s both;
  }
  .champ-celeb-btn {
    padding: 14px 36px; border-radius: 12px;
    background: var(--accent); color: #000; border: none;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s;
    animation: champ-fade-up 0.5s ease-out 0.85s both;
  }
  .champ-celeb-btn:hover { transform: scale(1.05); }
  .champ-confetti {
    position: absolute; top: -60px; font-size: 26px;
    pointer-events: none; animation: champ-confetti-fall linear forwards;
  }
  @keyframes champ-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes champ-fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes champ-trophy-pop {
    0% { transform: scale(0) rotate(-30deg); opacity: 0; }
    60% { transform: scale(1.25) rotate(8deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes champ-trophy-pulse {
    0%, 100% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.06) rotate(-4deg); }
    75% { transform: scale(1.06) rotate(4deg); }
  }
  @keyframes champ-confetti-fall { to { transform: translateY(110vh) rotate(720deg); } }

  /* ─── SCORE MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--modal-bg); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; min-width: 340px; max-width: 90vw;
    transition: background 0.3s;
  }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; }
  .modal-match { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .modal-player {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    background: var(--bg); border-radius: 10px; border: 2px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .modal-player:hover { border-color: var(--accent); }
  .modal-player.selected { border-color: var(--green); background: var(--winner-bg); }
  .modal-player .name { flex: 1; font-weight: 600; font-size: 15px; }
  .modal-player .check { font-size: 20px; visibility: hidden; }
  .modal-player.selected .check { visibility: visible; }
  .modal-vs {
    text-align: center; font-size: 12px; font-weight: 700;
    color: var(--text3); text-transform: uppercase; letter-spacing: 2px;
  }

  /* Score inputs in modal */
  .score-entry {
    display: flex; align-items: center; gap: 10px;
    justify-content: center; margin-bottom: 16px;
  }
  .score-entry .score-side {
    display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
  }
  .score-entry .score-side label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.5px;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .score-entry .score-input {
    width: 64px; padding: 10px; border-radius: 8px;
    border: 2px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 22px; font-weight: 700;
    text-align: center; font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  .score-entry .score-input:focus { border-color: var(--accent); }
  .score-entry .score-dash { font-size: 24px; font-weight: 700; color: var(--text3); }

  .score-hint {
    text-align: center; font-size: 11px; color: var(--text3); margin-bottom: 16px;
  }
  .score-divider {
    text-align: center; font-size: 11px; font-weight: 700; color: var(--text3);
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
  }

  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .modal-cancel { background: var(--bg3); color: var(--text2); }
  .modal-cancel:hover { background: var(--border); }
  .modal-confirm { background: var(--accent); color: #000; }
  .modal-confirm:hover { background: var(--accent2); }
  .modal-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── PLAYER PROFILE MODAL ─── */
  .profile-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--modal-bg); z-index: 300;
    align-items: center; justify-content: center;
  }
  .profile-modal-overlay.active { display: flex; }
  .profile-modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 380px; max-width: 90vw;
  }
  .profile-close {
    float: right; background: none; border: none; color: var(--text3);
    font-size: 22px; cursor: pointer; line-height: 1;
  }
  .profile-close:hover { color: var(--text); }
  .profile-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .profile-title { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
  .profile-stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;
  }
  .profile-stat-box {
    background: var(--bg); border-radius: 10px; padding: 12px; text-align: center;
    border: 1px solid var(--border);
  }
  .profile-stat-val { font-size: 24px; font-weight: 800; }
  .profile-stat-val.green { color: var(--green); }
  .profile-stat-val.red { color: var(--red); }
  .profile-stat-val.gold { color: var(--accent); }
  .profile-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .profile-h2h-title { font-size: 13px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .profile-h2h-list { max-height: 180px; overflow-y: auto; }
  .profile-h2h-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; border-radius: 8px; margin-bottom: 4px;
    background: var(--bg); font-size: 13px;
  }
  .profile-h2h-row .opp { font-weight: 600; }
  .profile-h2h-row .record { font-weight: 700; }
  .profile-h2h-row .record.positive { color: var(--green); }
  .profile-h2h-row .record.negative { color: var(--red); }
  .profile-h2h-row .record.even { color: var(--accent); }

  /* ─── STATS SCREEN ─── */
  .stats-container { max-width: 700px; margin: 0 auto; padding-top: 10px; }
  .stats-toggle {
    display: flex; gap: 4px; background: var(--bg2); border-radius: 10px;
    padding: 4px; margin-bottom: 20px; border: 1px solid var(--border);
  }
  .stats-toggle-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    background: transparent; color: var(--text2); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .stats-toggle-btn.active { background: var(--accent); color: #000; }

  .stats-view { display: none; }
  .stats-view.active { display: block; }

  .leaderboard-table {
    width: 100%; border-collapse: collapse; background: var(--bg2);
    border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
  }
  .leaderboard-table th {
    padding: 12px 16px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text3);
    text-align: left; background: var(--bg3); border-bottom: 1px solid var(--border);
  }
  .leaderboard-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  .leaderboard-table tr:last-child td { border-bottom: none; }
  .leaderboard-table .rank { font-weight: 800; color: var(--accent); width: 40px; }
  .leaderboard-table .player-cell { font-weight: 600; cursor: pointer; }
  .leaderboard-table .player-cell:hover { color: var(--accent); text-decoration: underline; }
  .leaderboard-table .wins-cell { color: var(--green); font-weight: 700; }
  .leaderboard-table .losses-cell { color: var(--red); font-weight: 700; }
  .leaderboard-table .champ-cell { color: var(--accent); font-weight: 700; }
  .leaderboard-table .streak-cell { font-weight: 700; font-size: 12px; }

  .week-history-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; margin-bottom: 12px;
  }
  .week-history-item h3 {
    font-size: 16px; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }

</style>

<body>

<div class="app-header">
  <h1><span>&#127955;</span> Pickleball Tournament</h1>
  <div class="header-right">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showScreen('setup')">Setup</button>
      <button class="nav-tab" onclick="showScreen('bracket')">Bracket</button>
      <button class="nav-tab" onclick="showScreen('stats')">Stats</button>

<!-- SETUP SCREEN -->
<div id="screen-setup" class="screen active">
  <div class="setup-container">
    <div class="setup-section">
      <h2>Match Format</h2>
      <div class="format-toggle">
        <button class="format-btn active" onclick="setFormat('singles')" id="fmt-singles">
          Singles<small>1 vs 1</small>
        </button>
        <button class="format-btn" onclick="setFormat('doubles')" id="fmt-doubles">
          Doubles<small>2 vs 2</small>
        </button>
      </div>
    </div>

    <div class="setup-section">
      <h2>Tournament Style</h2>
      <div class="format-toggle">
        <button class="format-btn active" onclick="setStyle('bracket')" id="style-bracket">
          Bracket<small>Single elimination</small>
        </button>
        <button class="format-btn" onclick="setStyle('roundrobin')" id="style-roundrobin">
          Round Robin<small>Everyone plays everyone</small>
        </button>
      </div>
    </div>

    <div class="setup-section">
      <h2>Players</h2>
      <div id="doubles-note" class="doubles-note" style="display:none;">
        Enter individual player names. They'll be randomly paired into teams of 2.
      </div>
      <div id="player-list"></div>
      <button class="add-player-btn" onclick="addPlayerInput()">+ Add Player</button>
    </div>

    <div class="setup-section">
      <h2>Options</h2>
      <label class="setup-checkbox">
        <input type="checkbox" id="opt-consolation" checked onchange="saveData('pb_opt_consolation', this.checked)">
        Enable consolation bracket (first-round losers)
      </label>
    </div>

    <div class="setup-section" style="background:transparent;border:none;padding:0;">
      <button class="start-btn" onclick="startTournament()" id="start-btn">
        Randomize &amp; Start Tournament
      </button>
      <p id="start-error" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none;"></p>

<!-- BRACKET SCREEN -->
<div id="screen-bracket" class="screen">
  <div class="bracket-empty" id="bracket-empty">
    <div class="icon">&#127955;</div>
    <p>No tournament running yet.<br>Add some players and start one.</p>
    <button onclick="showScreen('setup')">Start a Tournament</button>
  </div>
  <div id="bracket-content" style="display:none;">
    <div class="bracket-header">
      <h2 id="bracket-title">Tournament Bracket</h2>

      <div class="bracket-actions">
        <button class="bracket-action-btn" onclick="shareResults()">&#128228; Share Results</button>
        <button class="bracket-action-btn" id="recap-btn" onclick="showRecap()" style="display:none;">&#127881; Recap Card</button>
      </div>
    </div>
    <div class="bracket-wrapper" id="bracket-wrapper">
      <div class="bracket-labels" id="bracket-labels"></div>
      <div class="bracket-grid" id="bracket-container"></div>

    <div id="rr-area" style="display:none;"></div>
    <div id="consolation-area"></div>
    <div class="champion-display hidden" id="champion-display">
      <div class="champion-trophy">&#127942;</div>
      <div class="champion-label">Champion</div>
      <div class="champion-name" id="champion-name"></div>

<!-- STATS SCREEN -->
